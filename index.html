<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#1a1a2e;
  --fg:#ffffff;--fg2:#ffffffaa;--fg3:#ffffff44;--fg4:#ffffff18;
  --accent:#6366f1;--accent2:#818cf8;
  --card-bg:#ffffff07;--card-border:#ffffff0f;
  --input-bg:#ffffff08;--input-border:#ffffff14;
  --btn:#ffffff10;--btn-b:#ffffff18;
  --div:#ffffff0a;--prog:#ffffff0a;
  --ff:'Inter',sans-serif;--ffh:'Bebas Neue',sans-serif;--ffm:'JetBrains Mono',monospace;
  color-scheme:dark;
}
body.light{
  --bg:#f8f9ff;--bg2:#ffffff;--bg3:#eef0ff;
  --fg:#0a0a1a;--fg2:#0a0a1aaa;--fg3:#0a0a1a55;--fg4:#0a0a1a12;
  --card-bg:#ffffff;--card-border:#0000001a;
  --input-bg:#00000007;--input-border:#00000018;
  --btn:#00000008;--btn-b:#00000015;
  --div:#0000000c;--prog:#0000000c;
  color-scheme:light;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--ff);min-height:100vh;}
input,textarea,button,select{font-family:var(--ff);}
input[type=date]{color-scheme:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#fff2;border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes glow{0%,100%{opacity:0.6}50%{opacity:1}}

/* ── MAIN LAYOUT ── */
#app{max-width:700px;margin:0 auto;padding:24px 14px 100px;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;animation:fadeUp 0.5s ease;}
.hdr-left{}
.live-dot{display:inline-flex;align-items:center;gap:6px;background:var(--fg4);border:1px solid var(--div);border-radius:20px;padding:4px 10px;margin-bottom:10px;}
.live-pip{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse2 1.5s ease infinite;}
.live-txt{font-size:9px;letter-spacing:2px;color:var(--fg2);}
.app-name{font-family:var(--ffh);font-size:clamp(42px,11vw,72px);letter-spacing:5px;line-height:1;color:var(--fg);}
.app-sub{font-size:10px;color:var(--fg3);letter-spacing:2px;margin-top:4px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.clock-box{background:var(--fg4);border:1px solid var(--div);border-radius:12px;padding:8px 12px;text-align:right;}
.clock-time{font-family:var(--ffm);font-size:16px;color:var(--fg);font-weight:700;}
.clock-date{font-size:9px;color:var(--fg3);letter-spacing:1px;margin-top:2px;}
.theme-toggle{display:flex;gap:6px;}
.tt-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--btn-b);background:var(--btn);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tt-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── MEDIA/QUOTE ── */
.media-card{border-radius:20px;overflow:hidden;margin-bottom:24px;position:relative;box-shadow:0 20px 60px #0008;}
.media-card img,.media-card video{width:100%;max-height:220px;object-fit:cover;display:block;}
.media-overlay{position:absolute;inset:0;background:linear-gradient(to top,#000d 0%,transparent 55%);}
.media-q{position:absolute;bottom:16px;left:18px;right:18px;font-size:clamp(12px,3vw,15px);color:#fff;font-style:italic;line-height:1.6;text-align:center;}
.quote-card{background:linear-gradient(135deg,var(--accent)18,var(--bg2));border:1px solid var(--accent)33;border-radius:18px;padding:20px 22px;margin-bottom:22px;text-align:center;}
.quote-mark{font-family:var(--ffh);font-size:48px;color:var(--accent);line-height:0.6;display:block;margin-bottom:8px;}
.quote-txt{font-size:clamp(13px,3vw,16px);color:var(--fg2);font-style:italic;line-height:1.7;}

/* ── HERO ── */

.hero-count{position:relative;z-index:1;text-align:center;flex-shrink:0;}

.tboxes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.tbox{background:var(--fg4);border:1px solid var(--div);border-radius:12px;padding:12px 16px;text-align:center;min-width:70px;}

/* ══ LIST VIEW ══ */
.list-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.litem{border-radius:20px;overflow:hidden;background:var(--card-bg);border:1px solid var(--card-border);cursor:pointer;animation:fadeUp 0.3s ease;}
.litem.exp{border:2px solid var(--c);}
.litem-row{display:flex;align-items:center;gap:16px;padding:18px 20px;}
.l-ring{width:64px;height:64px;flex-shrink:0;position:relative;}
.l-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.l-ring-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.l-num{font-family:var(--ffh);font-size:20px;line-height:1;}
.l-lbl{font-size:7px;color:var(--fg3);letter-spacing:1px;}
.l-info{flex:1;min-width:0;}
.l-name{font-family:var(--ffh);font-size:clamp(16px,4vw,22px);letter-spacing:2px;line-height:1.1;color:var(--fg);margin-bottom:3px;}
.l-sub{font-size:9px;color:var(--fg3);letter-spacing:2px;margin-bottom:4px;}
.l-date{font-size:9px;color:var(--fg2);}
.l-prog{width:100%;height:3px;border-radius:2px;background:var(--prog);overflow:hidden;margin-top:7px;}
.l-pfill{height:100%;border-radius:2px;}
.l-arr{font-size:12px;color:var(--fg3);flex-shrink:0;}
.ldet{padding:16px 20px;border-top:1px solid var(--div);}

/* ══ CIRCLE VIEW ══ */
.circ-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
.citem{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:16px 10px;border-radius:20px;border:1px solid transparent;transition:all 0.2s;animation:fadeUp 0.3s ease;}
.citem.exp{background:var(--card-bg);border:2px solid var(--c);box-shadow:0 0 28px color-mix(in srgb,var(--c) 20%,transparent);}
.c-ring{position:relative;width:120px;height:120px;}
.c-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.c-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.c-num{font-family:var(--ffh);font-size:30px;line-height:1;}
.c-lbl{font-size:7px;color:var(--fg3);letter-spacing:2px;margin-top:2px;}
.c-name{font-family:var(--ffh);font-size:13px;letter-spacing:1px;text-align:center;margin-top:10px;line-height:1.3;color:var(--fg);}
.c-sub{font-size:9px;color:var(--fg3);text-align:center;margin-top:2px;}
.cdet{width:100%;margin-top:10px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;border:2px dashed var(--div);border-radius:24px;color:var(--fg3);margin-bottom:20px;}
.empty-ico{font-size:52px;margin-bottom:16px;}
.empty-txt{font-size:10px;letter-spacing:3px;}

/* ── FOOTER ── */
.footer{text-align:center;padding:12px;cursor:default;user-select:none;}
.footer-txt{font-size:8px;color:var(--fg4);letter-spacing:2px;}

.admin-bar{margin-bottom:12px;}
.admin-toggle-btn{width:100%;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:12px;color:var(--fg2);font-size:10px;letter-spacing:2px;cursor:pointer;}
.lock-lnk{display:block;text-align:center;font-size:8px;color:var(--fg3);letter-spacing:1px;cursor:pointer;margin-top:5px;}
.apanel-wrap{background:var(--bg2);border:1px solid var(--card-border);border-radius:22px;overflow:hidden;margin-bottom:32px;box-shadow:0 8px 32px #0004;}
.atabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--div);background:var(--bg3);}
.atab{flex:1;padding:12px 4px;border:none;background:transparent;color:var(--fg3);font-size:9px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
.atab.on{color:var(--accent);border-bottom:2px solid var(--accent);background:var(--accent)10;}
.apanel{padding:22px;}
.albl{font-size:8px;font-weight:600;color:var(--fg3);letter-spacing:2px;margin-top:14px;margin-bottom:6px;display:block;}
.ainp{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:11px;padding:11px 14px;color:var(--fg);font-size:12px;outline:none;}

.abtn-g{width:100%;background:#22c55e;border:none;border-radius:11px;padding:13px;color:#000;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:700;margin-top:14px;}
.abtn-o{background:var(--btn);border:1px solid var(--btn-b);border-radius:11px;padding:10px 16px;color:var(--fg2);font-size:10px;cursor:pointer;}

.sld-lbl{font-size:9px;color:var(--fg3);width:90px;flex-shrink:0;}

// ══ DOM HELPER ══
function h(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==='style'&&typeof attrs[k]==='object')Object.assign(e.style,attrs[k]);
    else if(k==='cls')e.className=attrs[k];
    else if(k[0]==='o'&&k[1]==='n')e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e[k]=attrs[k];
  }
  if(kids)[].concat(kids).forEach(function(c){if(c==null)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});
  return e;
}
function sv(tag,a){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);if(a)for(var k in a)e.setAttribute(k,a[k]);return e;}

  r.removeProperty('--ff');document.body.style.background='';
  var th=S.dark?(S.themeDark||{}):(S.themeLight||{});
  if(th.bgColor)document.body.style.background=th.bgColor;
  if(th.fontColor){r.setProperty('--fg',th.fontColor);r.setProperty('--fg2',th.fontColor+'aa');r.setProperty('--fg3',th.fontColor+'55');}
  if(th.fontFamily)r.setProperty('--ff',th.fontFamily);
  var st=S.style||{};
  if(st.title&&st.title.size)r.setProperty('--fs-title',st.title.size+'px');else r.removeProperty('--fs-title');

}

function renderExams(){var w=document.getElementById('exams-area');if(w){w.innerHTML='';renderExamsInto(w);}}
function sorted(){
  return S.exams.slice().sort(function(a,b){
    if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;
    if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;
    return new Date(a.date)-new Date(b.date);
  });
}
function filtered(){
  return sorted().filter(function(e){
    if(e.hidden&&!S.showHidden)return false;
    if(!S.search.trim())return true;
    var q=S.search.toLowerCase();
    return e.name.toLowerCase().includes(q)||(e.subject||'').toLowerCase().includes(q);
  });
}

  if(S.editId==='new')f.appendChild(mkExamEditor(S.draft,true));
  S.exams.forEach(function(ex){
    if(S.editId===ex.id){f.appendChild(mkExamEditor(S.draft,false));return;}
    var row=h('div',{cls:'erow'});
    row.appendChild(h('div',{cls:'erow-dot',style:{background:uc(daysLeft(ex.date))}}));
    var info=h('div',{cls:'erow-info'});
    info.appendChild(h('div',{cls:'erow-name'},[(ex.pinned?'📌 ':''),(ex.hidden?'🙈 ':'')+ex.name]));
    info.appendChild(h('div',{cls:'erow-sub'},[(ex.subject?ex.subject+' · ':'')+fmt(ex.date)]));
    row.appendChild(info);
    row.appendChild(h('button',{cls:'erow-edit',onClick:function(){S.editId=ex.id;S.draft=Object.assign({},ex);render();}},['EDIT']));
    f.appendChild(row);
  });
  return f;
}
function mkExamEditor(dr,isNew){
  var box=h('div',{cls:'ebox'});
  box.appendChild(h('div',{cls:'ebox-title'},[isNew?'➕ NEW EXAM':'✏️ EDIT EXAM']));
  function lbl(t){return h('span',{cls:'albl'},[t]);}
  function inp2(val,key,ph){return h('input',{cls:'ainp',type:'text',value:val,placeholder:ph,onInput:function(e){dr[key]=e.target.value;}});}
  box.appendChild(lbl('EXAM NAME *'));box.appendChild(inp2(dr.name,'name','e.g. Final Math Exam'));
  box.appendChild(lbl('SUBJECT'));box.appendChild(inp2(dr.subject,'subject','e.g. Mathematics'));
  box.appendChild(lbl('DATE *'));
  box.appendChild(h('input',{cls:'ainp',type:'date',value:dr.date,onChange:function(e){dr.date=e.target.value;}}));
  box.appendChild(lbl('IMAGE URL'));box.appendChild(inp2(dr.imageUrl,'imageUrl','Paste image URL...'));
  box.appendChild(lbl('ACCENT COLOR'));
  var cp=h('div',{cls:'cpal'});
  cp.appendChild(h('input',{type:'color',value:dr.color,style:{width:'36px',height:'36px',border:'1px solid var(--input-border)',borderRadius:'8px',background:'none',cursor:'pointer'},onInput:function(e){dr.color=e.target.value;}}));
  COLORS.forEach(function(c){cp.appendChild(h('div',{cls:'cpaldot'+(dr.color===c?' sel':''),style:{background:c},onClick:function(){dr.color=c;var ci=cp.querySelector('input[type=color]');if(ci)ci.value=c;}}))}); 
  box.appendChild(cp);
  var br=h('div',{cls:'abtn-row'});
  br.appendChild(h('button',{cls:'abtn-g',style:{flex:'1',marginTop:'0'},onClick:function(){
    if(!dr.name||!dr.date){alert('Please fill exam name and date!');return;}
    if(isNew)S.exams.push(dr);else S.exams=S.exams.map(function(x){return x.id===dr.id?dr:x;});
    fbSet('exams',S.exams);toast('✅ SAVED!');S.editId=null;render();
  }},[isNew?'ADD EXAM':'SAVE']));
  if(!isNew)br.appendChild(h('button',{cls:'abtn-r',onClick:function(){
    if(confirm('Delete?')){S.exams=S.exams.filter(function(x){return x.id!==dr.id;});fbSet('exams',S.exams);toast('🗑️ DELETED');S.editId=null;render();}
  }},['DEL']));
  br.appendChild(h('button',{cls:'abtn-o',onClick:function(){S.editId=null;render();}},['CANCEL']));
  box.appendChild(br);
  return box;
}

// ── THEME TAB ──
function mkThemeTab(){
  var f=document.createDocumentFragment();
  // Mode selector
  f.appendChild(h('span',{cls:'albl'},['THEME MODE']));
  var mr=h('div',{cls:'mode-row'});
  [{l:'🌙 DARK',d:true},{l:'☀️ LIGHT',d:false}].forEach(function(m){
    mr.appendChild(h('button',{cls:'mode-btn',
      style:{border:'2px solid '+(S.dark===m.d?'var(--accent)':'var(--btn-b)'),background:S.dark===m.d?'var(--accent)18':'var(--btn)',color:S.dark===m.d?'var(--accent)':'var(--fg2)'},
      onClick:function(){S.dark=m.d;localStorage.setItem('tdark',m.d?'1':'0');S.draftTheme=null;applyCSS();render();}
    },[m.l]));
  });
  f.appendChild(mr);
  var th=S.dark?(S.themeDark||{}):(S.themeLight||{});
  if(!S.draftTheme)S.draftTheme=Object.assign({bgColor:S.dark?'#08080f':'#f8f9ff',fontColor:S.dark?'#ffffff':'#0a0a1a',fontFamily:"'Inter',sans-serif"},th);
  var dt=S.draftTheme;
  f.appendChild(h('span',{cls:'albl'},['FONT FAMILY']));
  var fw=h('div',{cls:'ffrow',style:{marginBottom:'12px'}});
  FONTS.forEach(function(fn){fw.appendChild(h('button',{cls:'ffbtn'+(dt.fontFamily===fn.v?' sel':''),style:{fontFamily:fn.v},onClick:function(){dt.fontFamily=fn.v;render();}},[ fn.l]));});
  f.appendChild(fw);
  [{lbl:'BACKGROUND',key:'bgColor',presets:BGPRESETS},{lbl:'TEXT COLOR',key:'fontColor',presets:FGPRESETS}].forEach(function(cfg){
    f.appendChild(h('span',{cls:'albl'},[cfg.lbl]));
    var row=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});
    row.appendChild(h('input',{type:'color',value:dt[cfg.key],style:{width:'42px',height:'42px',border:'1px solid var(--input-border)',borderRadius:'10px',background:'none',cursor:'pointer'},onInput:function(e){dt[cfg.key]=e.target.value;render();}}));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--fg2)',fontFamily:'var(--ffm)'}},[dt[cfg.key].toUpperCase()]));
    f.appendChild(row);
    var pr=h('div',{cls:'pcrow'});
    cfg.presets.forEach(function(c){pr.appendChild(h('div',{cls:'pc'+(dt[cfg.key]===c?' sel':''),style:{background:c},onClick:function(){dt[cfg.key]=c;render();}}));});
    f.appendChild(pr);
  });
  f.appendChild(h('span',{cls:'albl'},['PREVIEW']));
  var prev=h('div',{cls:'prevbox',style:{background:dt.bgColor,border:'1px solid var(--div)'}});
  prev.appendChild(h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:dt.fontColor}},['T-MINUS']));
  prev.appendChild(h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'40px',color:dt.fontColor}},['42']));
  f.appendChild(prev);
  f.appendChild(h('button',{cls:'abtn-g',onClick:function(){
    if(S.dark){S.themeDark=Object.assign({},dt);fbSet('themeDark',S.themeDark);}
    else{S.themeLight=Object.assign({},dt);fbSet('themeLight',S.themeLight);}
    applyCSS();toast('✅ '+(S.dark?'DARK':'LIGHT')+' THEME SAVED FOR ALL!');render();
  }},['SAVE '+(S.dark?'DARK':'LIGHT')+' THEME']));
  return f;
}

// ── STYLE TAB ──
function mkStyleTab(){
  if(!S.draftStyle)S.draftStyle=JSON.parse(JSON.stringify(S.style||{title:{},card:{},body:{}}));
  var ds=S.draftStyle;
  var f=document.createDocumentFragment();
  f.appendChild(h('div',{style:{fontSize:'10px',color:'var(--fg2)',marginBottom:'16px',lineHeight:'1.7',background:'var(--input-bg)',borderRadius:'10px',padding:'10px 13px'}},['Control sizes, fonts and roundness for each section of the app.']));
  // Title
  var s1=h('div',{style:{marginBottom:'20px'}});
  s1.appendChild(h('div',{cls:'sec-hdr'},['📌 APP TITLE']));
  if(!ds.title)ds.title={};
  s1.appendChild(h('span',{cls:'albl'},['FONT SIZE']));
  s1.appendChild(mkSlider('Size',ds.title.size||60,30,120,function(v){ds.title.size=v;document.documentElement.style.setProperty('--fs-title',v+'px');}));
  f.appendChild(s1);
  // Cards
  var s2=h('div',{style:{marginBottom:'20px'}});
  s2.appendChild(h('div',{cls:'sec-hdr'},['🃏 EXAM CARDS']));
  if(!ds.card)ds.card={};
  s2.appendChild(h('span',{cls:'albl'},['CORNER RADIUS']));
  s2.appendChild(mkSlider('Radius',ds.card.radius||22,0,40,function(v){ds.card.radius=v;document.documentElement.style.setProperty('--card-r',v+'px');}));
  f.appendChild(s2);
  f.appendChild(h('button',{cls:'abtn-g',onClick:function(){
    S.style=JSON.parse(JSON.stringify(ds));fbSet('style',S.style);applyCSS();toast('✅ STYLE SAVED FOR ALL!');render();
  }},['SAVE STYLE FOR ALL STUDENTS']));
  return f;
}
function mkSlider(lbl2,val,min2,max2,onch){
  var ve=h('div',{cls:'sld-val'},[String(Math.round(val))]);
  var row=h('div',{cls:'sld-row'});
  row.appendChild(h('span',{cls:'sld-lbl'},[lbl2]));
  row.appendChild(h('input',{type:'range',cls:'sld',min:String(min2),max:String(max2),value:String(val),onInput:function(e){ve.textContent=Math.round(e.target.value);onch(Number(e.target.value));}}));
  row.appendChild(ve);
  return row;
}

// ── MEDIA TAB ──
function mkMediaTab(){
  var f=document.createDocumentFragment();
  f.appendChild(h('span',{cls:'albl'},['IMAGE / VIDEO / GIF']));
  var ul=h('label',{cls:'uplzone'});
  ul.appendChild(h('div',{cls:'uplico'},['📁']));
  ul.appendChild(h('div',{cls:'upltxt'},[S.draftMedia?'✅ '+S.draftMedia.name:'TAP TO UPLOAD']));
  var fi=h('input',{type:'file',accept:'image/*,video/*,.gif',style:{display:'none'},onChange:function(e){
    var file=e.target.files[0];if(!file)return;
    var r2=new FileReader();r2.onload=function(ev){S.draftMedia={url:ev.target.result,type:file.type.startsWith('video/')?'video':'image',name:file.name};render();};r2.readAsDataURL(file);
  }});
  ul.appendChild(fi);
  f.appendChild(ul);
  if(S.media)f.appendChild(h('button',{cls:'abtn-r',style:{width:'100%',marginTop:'8px'},onClick:function(){S.draftMedia=null;S.media=null;fbSet('media',null);toast('🗑️ REMOVED');render();}},['REMOVE MEDIA']));
  f.appendChild(h('span',{cls:'albl'},['MOTIVATIONAL QUOTE']));
  f.appendChild(h('textarea',{cls:'ainp',rows:3,placeholder:'Type a quote...',style:{resize:'vertical',marginBottom:'8px'},onInput:function(e){S.draftQuote=e.target.value;}},[ S.draftQuote||'']));
  f.appendChild(h('span',{cls:'albl'},['PRESET QUOTES']));
  var ql=h('div',{style:{maxHeight:'140px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px'}});
  QUOTES.forEach(function(q){ql.appendChild(h('button',{cls:'qpreset'+(S.draftQuote===q?' sel':''),onClick:function(){S.draftQuote=q;render();}},[ q]));});
  f.appendChild(ql);
  f.appendChild(h('button',{cls:'abtn-g',onClick:function(){
    S.media=S.draftMedia;S.quote=S.draftQuote;
    if(S.draftMedia)fbSet('media',S.draftMedia);
    fbSet('quote',S.draftQuote);
    toast('✅ SAVED FOR ALL!');render();
  }},['SAVE FOR ALL STUDENTS']));
  return f;
}

// ── VIEWS TAB ──
function mkViewsTab(){
  if(!S.draftViews)S.draftViews=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},S.viewNames);
  var dv=S.draftViews;
  var f=document.createDocumentFragment();
  var tr=h('div',{cls:'tog-row',onClick:function(){dv.same=!dv.same;render();}});
  var ti=h('div',{cls:'tog-info'});ti.appendChild(h('b',{},['🔁 SAME NAME FOR ALL']));ti.appendChild(h('span',{},['All 3 buttons use same label']));
  tr.appendChild(ti);
  var sw=h('div',{cls:'tog-sw',style:{background:dv.same?'var(--accent)':'var(--prog)'}});
  sw.appendChild(h('div',{cls:'tog-k',style:{left:dv.same?'23px':'3px'}}));
  tr.appendChild(sw);f.appendChild(tr);
  if(dv.same){
    f.appendChild(h('span',{cls:'albl'},['NAME FOR ALL VIEWS']));
    f.appendChild(h('input',{cls:'ainp',type:'text',value:dv.sameName,placeholder:'e.g. EXAMS...',onInput:function(e){dv.sameName=e.target.value;}}));
  } else {
    [['grid','⊞','GRID NAME'],['list','☰','LIST NAME'],['circle','◎','CIRCLE NAME']].forEach(function(cfg){
      f.appendChild(h('span',{cls:'albl'},[cfg[1]+' '+cfg[2]]));
      f.appendChild(h('input',{cls:'ainp',type:'text',value:dv[cfg[0]],placeholder:cfg[0].toUpperCase()+'...',onInput:function(e){dv[cfg[0]]=e.target.value;}}));
    });
  }
  f.appendChild(h('span',{cls:'albl'},['PREVIEW']));
  var pb=h('div',{cls:'pvbar'});
  [['⊞',dv.same?(dv.sameName||'GRID'):(dv.grid||'GRID')],['☰',dv.same?(dv.sameName||'LIST'):(dv.list||'LIST')],['◎',dv.same?(dv.sameName||'CIRCLE'):(dv.circle||'CIRCLE')]].forEach(function(p,i){
    var b=h('div',{cls:'pvb'+(i===0?' a':'')});
    b.appendChild(h('div',{style:{fontSize:'18px'}},[p[0]]));
    b.appendChild(h('div',{style:{fontSize:'9px',color:i===0?'var(--accent)':'var(--fg3)',marginTop:'3px',letterSpacing:'1px'}},[p[1]]));
    pb.appendChild(b);
  });
  f.appendChild(pb);
  f.appendChild(h('button',{cls:'abtn-g',style:{marginTop:'14px'},onClick:function(){
    S.viewNames=Object.assign({},dv);fbSet('viewNames',S.viewNames);toast('✅ SAVED FOR ALL!');render();
  }},['SAVE FOR ALL STUDENTS']));
  return f;
}

// ── ADS TAB ──
function mkAdsTab(){
  var f=document.createDocumentFragment();
  f.appendChild(h('div',{style:{textAlign:'center',padding:'30px 10px'}},[
    h('div',{style:{fontSize:'48px',marginBottom:'14px'}},['📢']),
    h('div',{style:{fontSize:'12px',fontWeight:'600',letterSpacing:'2px',marginBottom:'10px',color:'var(--fg)'}},['ADS PANEL']),
    h('div',{style:{fontSize:'10px',color:'var(--fg3)',lineHeight:'1.8'}},['Add banner ads, image ads and text ads here to earn money. Coaching centers, book shops and stationery stores can advertise in your app!'])
  ]));
  return f;
}

// ══ TOAST ══
function toast(msg){
  var t=document.createElement('div');
  t.className='toast';t.style.background='rgba(34,197,94,0.95)';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2500);
}

// ══ CLOCK ══
setInterval(function(){
  S.now=new Date();
  var ct=document.getElementById('clk-time');var cd=document.getElementById('clk-date');
  if(ct)ct.textContent=S.now.toLocaleTimeString();
  if(cd)cd.textContent=S.now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
},1000);

document.addEventListener('click',function(){if(S.showMenu){S.showMenu=false;render();}});

// ══ FIREBASE ══
fbGet('exams',function(v){S.exams=v||[];render();});
fbGet('themeDark',function(v){S.themeDark=v||{};if(S.dark)S.draftTheme=null;render();});
fbGet('themeLight',function(v){S.themeLight=v||{};if(!S.dark)S.draftTheme=null;render();});
fbGet('media',function(v){S.media=v;S.draftMedia=v;render();});
fbGet('quote',function(v){S.quote=v||'';S.draftQuote=v||'';render();});
fbGet('viewNames',function(v){S.viewNames=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},v);S.draftViews=null;render();});
fbGet('style',function(v){S.style=v||{title:{},card:{},body:{}};S.draftStyle=null;render();});

// ══ START ══
render();
</script>
