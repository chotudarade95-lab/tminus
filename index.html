<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>tminus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>tminus</h1>
<div id="data">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDoIrKyweKfpXbWz_sT63uEXsJqIO1wyzo",
authDomain: "t-minus-810ab.firebaseapp.com",
projectId: "t-minus-810ab",
storageBucket: "t-minus-810ab.firebasestorage.app",
messagingSenderId: "300879056115",
appId: "1:300879056115:web:735b602ea8d29b79393b86"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("students").onSnapshot((snapshot)=>{
let html="";
snapshot.forEach((doc)=>{
html += "<p>"+JSON.stringify(doc.data())+"</p>";
});
document.getElementById("data").innerHTML = html;
});

if ('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
