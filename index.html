<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#6366f1;
  --ffh:'Bebas Neue',sans-serif;
  --ffb:'Inter',sans-serif;
  --ffm:'JetBrains Mono',monospace;
  --ffc:'Orbitron',sans-serif;
  --title-size:clamp(36px,10vw,66px);
  --card-radius:20px;
  --card-name-size:18px;
  --card-num-size:52px;
  --card-subj-size:10px;
  --card-date-size:10px;
  --card-name-font:var(--ffh);
  --card-num-font:var(--ffh);
  --card-bg-opacity:1;
  --card-padding:20px;
}
body.dark{
  --bg:#070710;--bg2:#0e0e1c;--bg3:#13132a;
  --fg:#f0f0ff;--fg2:rgba(240,240,255,0.58);--fg3:rgba(240,240,255,0.3);--fg4:rgba(240,240,255,0.08);
  --card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--card-shadow:0 4px 24px rgba(0,0,0,0.5);
  --input-bg:rgba(255,255,255,0.06);--input-border:rgba(255,255,255,0.11);--input-color:#f0f0ff;
  --btn:rgba(255,255,255,0.07);--btn-b:rgba(255,255,255,0.13);
  --div:rgba(255,255,255,0.07);--prog:rgba(255,255,255,0.07);
  color-scheme:dark;
}
body.light{
  --bg:#eff2ff;--bg2:#ffffff;--bg3:#e4e8ff;
  --fg:#080818;--fg2:rgba(8,8,24,0.6);--fg3:rgba(8,8,24,0.36);--fg4:rgba(8,8,24,0.07);
  --card-bg:#ffffff;--card-border:rgba(0,0,0,0.08);--card-shadow:0 4px 20px rgba(0,0,0,0.08);
  --input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.11);--input-color:#080818;
  --btn:rgba(0,0,0,0.05);--btn-b:rgba(0,0,0,0.11);
  --div:rgba(0,0,0,0.07);--prog:rgba(0,0,0,0.07);
  color-scheme:light;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--ffb);min-height:100vh;transition:background 0.3s,color 0.3s;}
input,textarea,button,select{font-family:var(--ffb);}
input[type=date]{color-scheme:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--div);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes pip{0%,100%{opacity:0.4;transform:scale(0.9)}50%{opacity:1;transform:scale(1.1)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

/* ══ LAYOUT ══ */
#app{max-width:680px;margin:0 auto;padding:20px 14px 100px;}

/* ══ HEADER ══ */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:10px;}
.hdr-l{flex:1;min-width:0;}
.live-pill{display:inline-flex;align-items:center;gap:5px;background:var(--fg4);border:1px solid var(--div);border-radius:30px;padding:4px 10px 4px 8px;margin-bottom:8px;}
.pip{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pip 1.8s ease infinite;flex-shrink:0;}
.live-lbl{font-size:9px;letter-spacing:2px;color:var(--fg2);font-weight:600;}
.app-title{font-family:var(--ffh);font-size:var(--title-size);letter-spacing:6px;line-height:1;color:var(--fg);background:linear-gradient(135deg,var(--fg) 60%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.app-meta{font-size:9px;color:var(--fg3);letter-spacing:2px;margin-top:5px;font-weight:500;}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.clock-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:9px 13px;text-align:right;box-shadow:var(--card-shadow);}
.clock-t{font-family:var(--ffm);font-size:14px;color:var(--fg);font-weight:700;letter-spacing:1px;}
.clock-d{font-size:8px;color:var(--fg3);letter-spacing:1px;margin-top:2px;}
.tm-btns{display:flex;gap:5px;}
.tm-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--btn-b);background:var(--btn);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tm-btn.on{background:var(--accent);border-color:var(--accent);}

/* ══ MEDIA ══ */
.media-wrap{border-radius:20px;overflow:hidden;margin-bottom:22px;position:relative;box-shadow:0 16px 48px rgba(0,0,0,0.25);}
.media-wrap img,.media-wrap video{width:100%;max-height:220px;object-fit:cover;display:block;}
.media-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 55%);}
.media-q{position:absolute;bottom:14px;left:16px;right:16px;font-size:clamp(11px,3vw,14px);color:#fff;font-style:italic;line-height:1.6;text-align:center;}
.quote-wrap{background:linear-gradient(135deg,rgba(99,102,241,0.12),var(--bg2));border:1px solid rgba(99,102,241,0.2);border-radius:18px;padding:20px;margin-bottom:22px;text-align:center;}
.q-mark{font-family:var(--ffh);font-size:44px;color:var(--accent);line-height:0.7;display:block;margin-bottom:8px;}
.q-txt{font-size:clamp(13px,3vw,15px);color:var(--fg2);font-style:italic;line-height:1.7;}

/* ══ HERO ══ */
.hero{border-radius:22px;padding:20px 22px;margin-bottom:22px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;animation:float 5s ease-in-out infinite;}
.hero-glow{position:absolute;inset:0;pointer-events:none;}
.hero-left{position:relative;z-index:1;flex:1;min-width:0;}
.hero-badge{font-size:8px;letter-spacing:3px;color:var(--fg3);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.hero-name{font-family:var(--ffh);font-size:clamp(18px,5vw,28px);letter-spacing:3px;line-height:1.1;margin-bottom:4px;}
.hero-date{font-size:10px;color:var(--fg2);}
.hero-right{position:relative;z-index:1;text-align:center;flex-shrink:0;}
.hero-num{font-family:var(--ffh);font-size:clamp(42px,10vw,64px);line-height:1;}
.hero-sub{font-size:7px;letter-spacing:3px;color:var(--fg3);margin-top:2px;}

/* ══ CONTROLS ══ */
.ctrl{margin-bottom:16px;}
.search-wrap{position:relative;margin-bottom:10px;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.s-inp{width:100%;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:12px 14px 12px 40px;color:var(--fg);font-size:13px;outline:none;box-shadow:var(--card-shadow);}
.s-inp::placeholder{color:var(--fg3);}
.view-btns{display:flex;gap:8px;}
.vb{flex:1;padding:11px 6px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;color:var(--fg3);cursor:pointer;font-size:9px;letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;box-shadow:var(--card-shadow);font-weight:600;}
.vb.on{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.4);color:var(--accent);}
.vb-ico{font-size:19px;}

/* ══ GRID VIEW ══ */
.g-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}

/* ══ EXAM CARD ══ */
.xcard{border-radius:var(--card-radius);overflow:hidden;background:var(--card-bg);border:1px solid var(--card-border);cursor:pointer;transition:all 0.22s;box-shadow:var(--card-shadow);}
.xcard.exp{border:2px solid var(--xc);}
.xcard.pin{border-left:4px solid var(--xc);}
.xcard-top{display:flex;align-items:center;gap:14px;padding:var(--card-padding);position:relative;overflow:hidden;min-height:90px;}
.xcard-glow{position:absolute;inset:0;pointer-events:none;opacity:0.13;}
.xcard-img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid var(--xc);}
.xcard-mid{flex:1;min-width:0;position:relative;z-index:1;}
.xcard-subj{font-size:var(--card-subj-size);color:var(--fg3);letter-spacing:2px;margin-bottom:4px;font-weight:600;text-transform:uppercase;}
.xcard-name{font-family:var(--card-name-font);font-size:var(--card-name-size);letter-spacing:2px;line-height:1.2;color:var(--fg);margin-bottom:3px;}
.xcard-date{font-size:var(--card-date-size);color:var(--fg2);}
.xcard-right{text-align:center;position:relative;z-index:1;flex-shrink:0;min-width:60px;}
.xcard-num{font-family:var(--card-num-font);font-size:var(--card-num-size);line-height:1;}
.xcard-lbl{font-size:7px;letter-spacing:2px;color:var(--fg3);margin-top:2px;font-weight:600;}
.xcard-bar{padding:9px 20px;border-top:1px solid var(--div);display:flex;align-items:center;gap:10px;}
.xprog{flex:1;height:4px;border-radius:2px;background:var(--prog);overflow:hidden;}
.xprog-fill{height:100%;border-radius:2px;}
.xarr{font-size:10px;color:var(--fg3);}
.xcard-det{padding:16px 20px;border-top:1px solid var(--div);}
.xpin-badge{display:inline-flex;align-items:center;gap:4px;background:var(--xc);color:#fff;font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:6px;margin-bottom:8px;font-weight:700;}

/* TIME BOXES */
.tboxes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.tbox{background:var(--fg4);border:1px solid var(--div);border-radius:12px;padding:10px 14px;text-align:center;flex:1;min-width:70px;}
.tbox-n{font-family:var(--ffh);font-size:24px;line-height:1;}
.tbox-l{font-size:8px;color:var(--fg3);letter-spacing:2px;margin-top:3px;font-weight:600;}
.det-msg{font-size:11px;letter-spacing:1px;margin-bottom:12px;padding:10px 14px;border-radius:10px;font-weight:600;}
.det-date{font-size:10px;color:var(--fg2);margin-bottom:10px;}
.det-acts{display:flex;gap:7px;padding-top:10px;border-top:1px solid var(--div);}
.dact{flex:1;padding:9px;border:1px solid var(--btn-b);border-radius:10px;background:var(--btn);color:var(--fg2);font-size:9px;letter-spacing:1px;cursor:pointer;font-weight:600;}

/* ══ LIST VIEW ══ */
.l-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.litem{border-radius:18px;overflow:hidden;background:var(--card-bg);border:1px solid var(--card-border);cursor:pointer;box-shadow:var(--card-shadow);}
.litem.exp{border:2px solid var(--xc);}
.litem-row{display:flex;align-items:center;gap:14px;padding:16px 18px;}
.l-ring{width:60px;height:60px;flex-shrink:0;position:relative;}
.l-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.l-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.l-n{font-family:var(--card-num-font);font-size:18px;line-height:1;}
.l-l{font-size:7px;color:var(--fg3);letter-spacing:1px;font-weight:600;}
.l-info{flex:1;min-width:0;}
.l-name{font-family:var(--card-name-font);font-size:clamp(14px,4vw,20px);letter-spacing:2px;line-height:1.1;color:var(--fg);margin-bottom:3px;}
.l-sub{font-size:9px;color:var(--fg3);letter-spacing:2px;margin-bottom:3px;font-weight:600;}
.l-date{font-size:9px;color:var(--fg2);}
.l-prog{width:100%;height:3px;border-radius:2px;background:var(--prog);overflow:hidden;margin-top:7px;}
.l-pfill{height:100%;border-radius:2px;}
.l-arr{font-size:11px;color:var(--fg3);flex-shrink:0;}
.ldet{padding:14px 18px;border-top:1px solid var(--div);}

/* ══ CIRCLE VIEW ══ */
.c-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:20px;}
.citem{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:16px 10px;border-radius:18px;border:1px solid transparent;transition:all 0.2s;background:var(--card-bg);border-color:var(--card-border);box-shadow:var(--card-shadow);}
.citem.exp{border:2px solid var(--xc);box-shadow:0 0 24px color-mix(in srgb,var(--xc) 25%,transparent);}
.c-ring{position:relative;width:110px;height:110px;}
.c-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.c-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.c-num{font-family:var(--card-num-font);font-size:28px;line-height:1;}
.c-lbl{font-size:7px;color:var(--fg3);letter-spacing:2px;margin-top:2px;font-weight:600;}
.c-name{font-family:var(--card-name-font);font-size:12px;letter-spacing:1px;text-align:center;margin-top:9px;line-height:1.3;color:var(--fg);max-width:140px;}
.c-sub{font-size:8px;color:var(--fg3);text-align:center;margin-top:2px;letter-spacing:1px;}
.cdet{width:100%;margin-top:10px;padding-top:10px;border-top:1px solid var(--div);}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:56px 20px;border:2px dashed var(--div);border-radius:22px;color:var(--fg3);margin-bottom:20px;}
.empty-ico{font-size:48px;margin-bottom:14px;}
.empty-txt{font-size:10px;letter-spacing:3px;font-weight:600;}

/* ══ FOOTER ══ */
.footer{text-align:center;padding:12px;cursor:default;user-select:none;}
.footer-txt{font-size:8px;color:var(--fg4);letter-spacing:2px;}

/* ══ ADMIN ══ */
.admin-bar{margin-bottom:12px;}
.admin-btn{width:100%;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:12px;color:var(--fg2);font-size:10px;letter-spacing:2px;cursor:pointer;font-weight:600;}
.lock-btn{display:block;text-align:center;font-size:8px;color:var(--fg3);letter-spacing:1px;cursor:pointer;margin-top:5px;}
.apanel{background:var(--bg2);border:1px solid var(--card-border);border-radius:22px;overflow:hidden;margin-bottom:32px;box-shadow:0 8px 40px rgba(0,0,0,0.15);}
.atabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--div);background:var(--bg3);}
.atab{flex:1;padding:11px 4px;border:none;background:transparent;color:var(--fg3);font-size:8px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;font-weight:700;}
.atab.on{color:var(--accent);border-bottom:2px solid var(--accent);background:rgba(99,102,241,0.08);}
.atab-body{padding:20px;}
.albl{font-size:8px;font-weight:700;color:var(--fg3);letter-spacing:2px;margin-top:14px;margin-bottom:6px;display:block;}
.ainp{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:11px;padding:11px 14px;color:var(--input-color);font-size:12px;outline:none;}
.ainp::placeholder{color:var(--fg3);}
.abtn-g{width:100%;background:#22c55e;border:none;border-radius:11px;padding:12px;color:#000;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:800;margin-top:14px;}
.abtn-o{background:var(--btn);border:1px solid var(--btn-b);border-radius:11px;padding:9px 14px;color:var(--fg2);font-size:10px;cursor:pointer;font-weight:600;}
.abtn-r{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:11px;padding:9px 14px;color:#ef4444;font-size:10px;cursor:pointer;font-weight:600;}
.arow{display:flex;gap:8px;margin-top:12px;}
.erow{display:flex;align-items:center;gap:10px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.erow-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.erow-info{flex:1;min-width:0;}
.erow-name{font-size:13px;font-weight:700;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.erow-sub{font-size:9px;color:var(--fg3);margin-top:2px;}
.erow-edit{background:var(--btn);border:1px solid var(--btn-b);border-radius:8px;padding:5px 10px;color:var(--fg2);font-size:9px;cursor:pointer;font-weight:600;}
.ebox{background:var(--input-bg);border:1px solid var(--input-border);border-radius:16px;padding:18px;margin-bottom:12px;}
.ebox-t{font-size:11px;font-weight:700;color:var(--fg);letter-spacing:2px;margin-bottom:14px;}
.cpal{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px;}
.cdot{width:28px;height:28px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:transform 0.1s;}
.cdot.sel{border:3px solid var(--fg);transform:scale(1.12);}
.ff-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.ff-btn{background:var(--btn);border:1px solid var(--btn-b);border-radius:9px;padding:7px 12px;color:var(--fg);cursor:pointer;font-size:12px;transition:all 0.15s;white-space:nowrap;}
.ff-btn.sel{background:rgba(99,102,241,0.15);border-color:var(--accent);color:var(--accent);}
.pc-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.pc{width:26px;height:26px;border-radius:7px;cursor:pointer;border:3px solid transparent;transition:transform 0.1s;}
.pc.sel{border:3px solid var(--accent);transform:scale(1.1);}
.prev-box{border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin:12px 0;border:1px solid var(--div);}
.tog-row{display:flex;align-items:center;justify-content:space-between;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:13px 15px;cursor:pointer;margin-bottom:12px;}
.tog-info b{display:block;font-size:11px;font-weight:700;color:var(--fg);letter-spacing:1px;}
.tog-info s2{font-size:9px;color:var(--fg3);margin-top:2px;display:block;}
.sw{width:44px;height:24px;border-radius:12px;position:relative;transition:background 0.2s;flex-shrink:0;}
.sw-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.upl{border:2px dashed var(--input-border);border-radius:14px;padding:22px;text-align:center;cursor:pointer;background:var(--input-bg);margin-top:6px;}
.upl-ico{font-size:26px;margin-bottom:6px;}
.upl-txt{font-size:10px;color:var(--fg3);}
.qp{width:100%;background:var(--btn);border:1px solid var(--btn-b);border-radius:9px;padding:8px 12px;color:var(--fg2);font-size:10px;cursor:pointer;text-align:left;line-height:1.6;margin-bottom:5px;}
.qp.sel{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.4);color:var(--fg);}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slbl{font-size:9px;color:var(--fg3);width:90px;flex-shrink:0;font-weight:600;}
.sld{flex:1;accent-color:var(--accent);}
.sval{font-size:10px;color:var(--fg2);width:36px;text-align:right;font-family:var(--ffm);}
.sec-h{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--fg);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--div);}
.mode-row{display:flex;gap:8px;margin-bottom:14px;}
.mode-btn{flex:1;padding:11px;border-radius:12px;cursor:pointer;font-size:11px;letter-spacing:1px;font-weight:700;transition:all 0.2s;border:2px solid;}
.pvbar{display:flex;gap:6px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:5px;margin-top:8px;}
.pvb{flex:1;padding:8px;text-align:center;border-radius:9px;}
.pvb.a{background:rgba(99,102,241,0.12);}
.info-box{background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;padding:10px 13px;font-size:9px;color:var(--fg2);line-height:1.7;margin-bottom:12px;}
.card-preview{border-radius:16px;overflow:hidden;border:1px solid var(--card-border);background:var(--card-bg);margin-top:12px;}
.cp-top{display:flex;align-items:center;gap:12px;padding:16px;position:relative;overflow:hidden;}
.cp-glow{position:absolute;inset:0;pointer-events:none;opacity:0.15;}
.cp-mid{flex:1;}
.cp-subj{font-size:var(--card-subj-size);color:var(--fg3);letter-spacing:2px;margin-bottom:3px;}
.cp-name{font-family:var(--card-name-font);font-size:var(--card-name-size);color:var(--fg);}
.cp-date{font-size:var(--card-date-size);color:var(--fg2);margin-top:3px;}
.cp-right{text-align:center;min-width:56px;}
.cp-num{font-family:var(--card-num-font);font-size:var(--card-num-size);line-height:1;}
.cp-lbl{font-size:7px;color:var(--fg3);letter-spacing:2px;}
.cp-bar{padding:8px 16px;border-top:1px solid var(--div);display:flex;gap:8px;align-items:center;}
.cp-prog{flex:1;height:4px;border-radius:2px;background:var(--prog);overflow:hidden;}
.cp-fill{height:4px;border-radius:2px;width:65%;background:#22c55e;}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(8px);}
.modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:24px;padding:28px;width:300px;box-shadow:0 24px 80px rgba(0,0,0,0.4);}
.modal-ico{font-size:34px;text-align:center;margin-bottom:8px;}
.modal-ttl{font-family:var(--ffh);font-size:24px;text-align:center;letter-spacing:3px;margin-bottom:4px;}
.modal-sub{font-size:9px;color:var(--fg3);text-align:center;letter-spacing:1px;margin-bottom:18px;}
.pw-inp{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:13px;color:var(--input-color);font-size:16px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:6px;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;border-radius:30px;padding:10px 22px;font-size:10px;color:#fff;letter-spacing:1px;box-shadow:0 8px 24px rgba(0,0,0,0.3);white-space:nowrap;font-weight:700;}
</style>

<body class="dark">
<div id="app"></div>
<script>
// ══ CONSTANTS ══
var COLORS=['#6366f1','#f59e0b','#22c55e','#ef4444','#06b6d4','#a855f7','#f97316','#ec4899','#14b8a6','#84cc16'];
var FONTS=[
  {l:'Bebas Neue',v:"'Bebas Neue',sans-serif"},
  {l:'Orbitron',v:"'Orbitron',sans-serif"},

var PW='admin123';

// ══ STATE ══
var S={
  exams:[],themeDark:{},themeLight:{},media:null,quote:'',
  viewNames:{grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},
  cardStyle:{nameFont:"'Bebas Neue',sans-serif",numFont:"'Bebas Neue',sans-serif",nameSize:18,numSize:52,subjSize:10,dateSize:10,radius:20,padding:20,bgOpacity:100},
  appStyle:{titleFont:"'Bebas Neue',sans-serif",titleSize:60,bodyFont:"'Inter',sans-serif"},
  view:localStorage.getItem('tv')||'grid',
  dark:localStorage.getItem('tdark')==='0'?false:true,
  adminOpen:false,adminUnlocked:false,adminTab:'exams',
  search:'',showHidden:false,expanded:null,editId:null,draft:null,
  pwOpen:false,pwVal:'',pwErr:false,taps:0,tapTimer:null,
  draftTheme:null,draftCard:null,draftApp:null,draftMedia:null,draftQuote:'',draftViews:null,
  now:new Date()
};

// ══ HELPERS ══
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function dL(d){if(!d)return null;var e=new Date(d);e.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return Math.ceil((e-t)/86400000);}
function fmt(d){if(!d)return '';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function uc(d){if(d===null)return '#6366f1';if(d<0)return '#6b7280';if(d<=3)return '#ef4444';if(d<=7)return '#f59e0b';if(d<=30)return '#f97316';return '#22c55e';}
function pc(d){return d!==null&&d>=0?Math.max(0,Math.min(100,100-d/3.65)):100;}
function h(tag,a,k){
  var e=document.createElement(tag);
  if(a)for(var p in a){if(p==='style'&&typeof a[p]==='object')Object.assign(e.style,a[p]);else if(p==='cls')e.className=a[p];else if(p[0]==='o'&&p[1]==='n')e.addEventListener(p.slice(2).toLowerCase(),a[p]);else e[p]=a[p];}
  if(k)[].concat(k).forEach(function(c){if(c==null)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});
  return e;
}
function sv(tag,a){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);if(a)for(var p in a)e.setAttribute(p,a[p]);return e;}

// ══ CSS APPLY ══
function applyCSS(){
  document.body.className=S.dark?'dark':'light';
  var r=document.documentElement.style;
  // Clear all overrides
  ['--fg','--fg2','--fg3','--fg4','--bg','--bg2','--bg3','--card-bg','--card-border',
   '--input-bg','--input-border','--btn','--btn-b','--ffb','--ffh'].forEach(function(p){r.removeProperty(p);});
  document.body.style.removeProperty('background');
  document.body.style.removeProperty('color');

  // Font only from theme
  var th=S.dark?(S.themeDark||{}):(S.themeLight||{});
  if(th.fontFamily)r.setProperty('--ffb',th.fontFamily);

  // App style
  var as=S.appStyle||{};
  r.setProperty('--title-size',(as.titleSize||60)+'px');
  r.setProperty('--ffh',as.titleFont||"'Bebas Neue',sans-serif");
  if(as.bodyFont)r.setProperty('--ffb',as.bodyFont);

  // Card style
  var cs=S.cardStyle||{};
  r.setProperty('--card-radius',(cs.radius||20)+'px');
  r.setProperty('--card-name-size',(cs.nameSize||18)+'px');
  r.setProperty('--card-num-size',(cs.numSize||52)+'px');
  r.setProperty('--card-subj-size',(cs.subjSize||10)+'px');
  r.setProperty('--card-date-size',(cs.dateSize||10)+'px');
  r.setProperty('--card-name-font',cs.nameFont||"'Bebas Neue',sans-serif");
  r.setProperty('--card-num-font',cs.numFont||"'Bebas Neue',sans-serif");
  r.setProperty('--card-padding',(cs.padding||20)+'px');
}

// ══ RENDER ══
function render(){
  applyCSS();
  var app=document.getElementById('app');
  app.innerHTML='';
  var f=document.createDocumentFragment();
  f.appendChild(mkHeader());
  if(S.media||S.quote)f.appendChild(mkMedia());
  var hero=getHero();if(hero)f.appendChild(mkHero(hero));
  if(S.exams.length)f.appendChild(mkControls());
  f.appendChild(mkExams());
  f.appendChild(mkFooter());
  if(S.adminUnlocked){f.appendChild(mkAdminBar());if(S.adminOpen)f.appendChild(mkAdminPanel());}
  if(S.pwOpen)f.appendChild(mkPwModal());
  app.appendChild(f);
}

// ══ HEADER ══
function mkHeader(){
  var w=h('div',{cls:'hdr'});
  var l=h('div',{cls:'hdr-l'});
  var pill=h('div',{cls:'live-pill'});
  pill.appendChild(h('div',{cls:'pip'}));
  pill.appendChild(h('span',{cls:'live-lbl'},['LIVE SYNC']));
  l.appendChild(pill);
  l.appendChild(h('div',{cls:'app-title'},['T-MINUS']));
  l.appendChild(h('div',{cls:'app-meta'},[S.exams.length+' EXAMS · '+S.exams.filter(function(e){var d=dL(e.date);return d!==null&&d>=0;}).length+' UPCOMING']));
  w.appendChild(l);
  var r=h('div',{cls:'hdr-r'});
  var cb=h('div',{cls:'clock-card'});
  cb.appendChild(h('div',{cls:'clock-t',id:'ck-t'},[S.now.toLocaleTimeString()]));
  cb.appendChild(h('div',{cls:'clock-d',id:'ck-d'},[S.now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})]));
  r.appendChild(cb);
  var tb=h('div',{cls:'tm-btns'});
  tb.appendChild(h('button',{cls:'tm-btn'+(S.dark?' on':''),onClick:function(e){e.stopPropagation();S.dark=true;localStorage.setItem('tdark','1');S.draftTheme=null;applyCSS();render();}},['🌙']));
  tb.appendChild(h('button',{cls:'tm-btn'+(!S.dark?' on':''),onClick:function(e){e.stopPropagation();S.dark=false;localStorage.setItem('tdark','0');S.draftTheme=null;applyCSS();render();}},['☀️']));
  r.appendChild(tb);
  w.appendChild(r);
  return w;
}

// ══ MEDIA ══
function mkMedia(){
  if(S.media){
    var w=h('div',{cls:'media-wrap'});
    w.appendChild(S.media.type==='video'?h('video',{src:S.media.url,autoplay:true,loop:true,muted:true}):h('img',{src:S.media.url}));
    if(S.quote){w.appendChild(h('div',{cls:'media-ov'}));w.appendChild(h('div',{cls:'media-q'},['"'+S.quote+'"']));}
    return w;
  }
  var w=h('div',{cls:'quote-wrap'});
  w.appendChild(h('span',{cls:'q-mark'},['"']));
  w.appendChild(h('p',{cls:'q-txt'},[S.quote]));
  return w;
}

// ══ HERO ══
function getHero(){
  return sortedExams().find(function(e){if(e.hidden)return false;var d=dL(e.date);return d!==null&&d>=0;});
}
function mkHero(ex){
  var d=dL(ex.date);var c=uc(d);
  var w=h('div',{cls:'hero',style:{border:'1px solid '+c+'44',background:'linear-gradient(135deg,'+ex.color+'18,'+ex.color+'05)'}});
  w.appendChild(h('div',{cls:'hero-glow',style:{background:'radial-gradient(ellipse at 80% 50%,'+c+'30,transparent 65%)'}}));
  var l=h('div',{cls:'hero-left'});
  var badge=h('div',{cls:'hero-badge'});
  badge.appendChild(h('span',{},'⚡'));
  badge.appendChild(h('span',{style:{letterSpacing:'3px'}},'NEXT EXAM'));
  l.appendChild(badge);
  l.appendChild(h('div',{cls:'hero-name',style:{color:c}},[ex.name]));
  if(ex.date)l.appendChild(h('div',{cls:'hero-date'},[fmt(ex.date)]));
  w.appendChild(l);
  var r=h('div',{cls:'hero-right'});
  r.appendChild(h('div',{cls:'hero-num',style:{color:c,filter:'drop-shadow(0 0 14px '+c+'88)'}},[d===0?'NOW':d===null?'—':String(d)]));
  r.appendChild(h('div',{cls:'hero-sub'},['T-MINUS']));
  w.appendChild(r);
  return w;
}

// ══ CONTROLS ══
function mkControls(){
  var w=h('div',{cls:'ctrl'});
  var sw=h('div',{cls:'search-wrap'});
  sw.appendChild(h('span',{cls:'s-ico'},['🔍']));
  sw.appendChild(h('input',{cls:'s-inp',type:'text',value:S.search,placeholder:'Search exams...',onInput:function(e){S.search=e.target.value;renderExams();}}));
  w.appendChild(sw);
  var vn=S.viewNames;
  var vr=h('div',{cls:'view-btns'});
  [['grid','⊞',vn.same?(vn.sameName||'GRID'):(vn.grid||'GRID')],
   ['list','☰',vn.same?(vn.sameName||'LIST'):(vn.list||'LIST')],
   ['circle','◎',vn.same?(vn.sameName||'CIRCLE'):(vn.circle||'CIRCLE')]].forEach(function(v){
    var b=h('button',{cls:'vb'+(S.view===v[0]?' on':''),onClick:function(e){e.stopPropagation();S.view=v[0];localStorage.setItem('tv',v[0]);S.expanded=null;render();}});
    b.appendChild(h('span',{cls:'vb-ico'},[v[1]]));
    b.appendChild(h('span',{},[v[2]]));
    vr.appendChild(b);
  });
  w.appendChild(vr);
  return w;
}

// ══ EXAMS ══
function sortedExams(){
  return S.exams.slice().sort(function(a,b){
    if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;
    if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;
    return new Date(a.date)-new Date(b.date);
  });
}
function filteredExams(){
  return sortedExams().filter(function(e){
    if(e.hidden&&!S.showHidden)return false;
    if(!S.search.trim())return true;
    var q=S.search.toLowerCase();
    return e.name.toLowerCase().includes(q)||(e.subject||'').toLowerCase().includes(q);
  });
}
function mkExams(){
  var w=h('div',{id:'xarea'});
  if(!S.exams.length){w.appendChild(h('div',{cls:'empty'},[h('div',{cls:'empty-ico'},['📅']),h('div',{cls:'empty-txt'},['NO EXAMS YET'])]));return w;}
  fillExams(w);return w;
}
function renderExams(){var w=document.getElementById('xarea');if(w){w.innerHTML='';fillExams(w);}}
function fillExams(w){
  var list=filteredExams();
  if(S.view==='list'){var ul=h('div',{cls:'l-wrap'});list.forEach(function(e){ul.appendChild(mkList(e));});w.appendChild(ul);}
  else if(S.view==='circle'){var cw=h('div',{cls:'c-wrap'});list.forEach(function(e){cw.appendChild(mkCircle(e));});w.appendChild(cw);}
  else{var gw=h('div',{cls:'g-wrap'});list.forEach(function(e){gw.appendChild(mkCard(e));});w.appendChild(gw);}
  var hid=S.exams.filter(function(e){return e.hidden;}).length;
  if(hid>0)w.appendChild(h('div',{style:{textAlign:'center',marginBottom:'12px'}},[h('button',{cls:'abtn-o',style:{fontSize:'9px'},onClick:function(){S.showHidden=!S.showHidden;renderExams();}},[S.showHidden?'👁 HIDE HIDDEN':'👁 SHOW '+hid+' HIDDEN'])]));
}

// ══ GRID CARD ══
function mkCard(ex){
  var d=dL(ex.date);var c=uc(d);var p=pc(d);var isExp=S.expanded===ex.id;
  var card=h('div',{cls:'xcard'+(isExp?' exp':'')+(ex.pinned?' pin':''),style:{'--xc':ex.color,opacity:ex.hidden?'0.5':'1'}});
  card.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  var top=h('div',{cls:'xcard-top'});
  top.appendChild(h('div',{cls:'xcard-glow',style:{background:'radial-gradient(ellipse at 75% 50%,'+ex.color+',transparent 65%)'}}));
  if(ex.imageUrl)top.appendChild(h('img',{cls:'xcard-img',src:ex.imageUrl}));
  var mid=h('div',{cls:'xcard-mid'});
  if(ex.pinned)mid.appendChild(h('div',{cls:'xpin-badge',style:{background:ex.color}},['📌 PINNED']));
  if(ex.subject)mid.appendChild(h('div',{cls:'xcard-subj'},[ex.subject]));
  mid.appendChild(h('div',{cls:'xcard-name'},[ex.name||'Unnamed']));
  if(ex.date)mid.appendChild(h('div',{cls:'xcard-date'},[fmt(ex.date)]));
  top.appendChild(mid);
  var rt=h('div',{cls:'xcard-right'});
  rt.appendChild(h('div',{cls:'xcard-num',style:{color:c,filter:'drop-shadow(0 0 10px '+c+'66)'}},[d===null?'—':d<0?'✓':d===0?'NOW':String(d)]));
  rt.appendChild(h('div',{cls:'xcard-lbl'},[d===null?'—':d<0?'PAST':d===0?'TODAY':'DAYS']));
  top.appendChild(rt);
  card.appendChild(top);
  var bar=h('div',{cls:'xcard-bar'});
  var pt=h('div',{cls:'xprog'});pt.appendChild(h('div',{cls:'xprog-fill',style:{width:p+'%',background:'linear-gradient(90deg,'+c+'66,'+c+')'}}));
  bar.appendChild(pt);bar.appendChild(h('div',{cls:'xarr'},[isExp?'▲':'▼']));
  card.appendChild(bar);
  if(isExp){var det=h('div',{cls:'xcard-det'});det.appendChild(mkDet(ex,d,c));card.appendChild(det);}
  return card;
}

// ══ LIST ══
function mkList(ex){
  var d=dL(ex.date);var c=uc(d);var p=pc(d);var isExp=S.expanded===ex.id;
  var r2=26,ci=2*Math.PI*r2,off=ci-(p/100)*ci;
  var wrap=h('div');
  var item=h('div',{cls:'litem'+(isExp?' exp':''),style:{'--xc':ex.color,opacity:ex.hidden?'0.5':'1'}});
  item.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  var row=h('div',{cls:'litem-row'});
  var ring=h('div',{cls:'l-ring'});
  var s=sv('svg',{width:'60',height:'60',class:'l-svg'});
  s.appendChild(sv('circle',{cx:'30',cy:'30',r:'26',fill:'none',stroke:c+'22','stroke-width':'6'}));
  s.appendChild(sv('circle',{cx:'30',cy:'30',r:'26',fill:'none',stroke:c,'stroke-width':'6','stroke-linecap':'round','stroke-dasharray':String(ci),'stroke-dashoffset':String(off)}));
  ring.appendChild(s);
  var mid=h('div',{cls:'l-mid'});
  mid.appendChild(h('div',{cls:'l-n',style:{color:c}},[d===null?'—':d<0?'✓':d===0?'!':String(d)]));
  mid.appendChild(h('div',{cls:'l-l'},[d===null?'—':d<0?'DONE':d===0?'TODAY':'DAYS']));
  ring.appendChild(mid);row.appendChild(ring);
  var info=h('div',{cls:'l-info'});
  if(ex.pinned||ex.subject)info.appendChild(h('div',{cls:'l-sub'},[(ex.pinned?'📌 ':''),(ex.subject||'')]));
  info.appendChild(h('div',{cls:'l-name'},[ex.name||'Unnamed']));
  if(ex.date)info.appendChild(h('div',{cls:'l-date'},[fmt(ex.date)]));
  var lp=h('div',{cls:'l-prog'});lp.appendChild(h('div',{cls:'l-pfill',style:{width:p+'%',background:'linear-gradient(90deg,'+c+'66,'+c+')'}}));
  info.appendChild(lp);row.appendChild(info);
  row.appendChild(h('div',{cls:'l-arr'},[isExp?'▲':'▼']));
  item.appendChild(row);wrap.appendChild(item);
  if(isExp){var det=h('div',{cls:'ldet'});det.appendChild(mkDet(ex,d,c));wrap.appendChild(det);}
  return wrap;
}

// ══ CIRCLE ══
function mkCircle(ex){
  var d=dL(ex.date);var c=uc(d);var p=pc(d);var isExp=S.expanded===ex.id;
  var r2=48,ci=2*Math.PI*r2,off=ci-(p/100)*ci;
  var wrap=h('div',{cls:'citem'+(isExp?' exp':''),style:{'--xc':ex.color,opacity:ex.hidden?'0.5':'1'}});
  wrap.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  var ring=h('div',{cls:'c-ring'});
  var s=sv('svg',{width:'110',height:'110',class:'c-svg'});
  s.appendChild(sv('circle',{cx:'55',cy:'55',r:'48',fill:'none',stroke:c+'22','stroke-width':'8'}));
  s.appendChild(sv('circle',{cx:'55',cy:'55',r:'48',fill:'none',stroke:c,'stroke-width':'8','stroke-linecap':'round','stroke-dasharray':String(ci),'stroke-dashoffset':String(off)}));
  ring.appendChild(s);
  var mid=h('div',{cls:'c-mid'});
  mid.appendChild(h('div',{cls:'c-num',style:{color:c,filter:'drop-shadow(0 0 8px '+c+'88)'}},[d===null?'—':d<0?'✓':d===0?'NOW':String(d)]));
  mid.appendChild(h('div',{cls:'c-lbl'},[d===null?'—':d<0?'PAST':d===0?'TODAY':'T-MINUS']));
  ring.appendChild(mid);wrap.appendChild(ring);
  wrap.appendChild(h('div',{cls:'c-name'},[ex.name||'Unnamed']));
  if(ex.subject)wrap.appendChild(h('div',{cls:'c-sub'},[ex.subject]));
  if(isExp){var cd=h('div',{cls:'cdet'});cd.appendChild(mkDet(ex,d,c));wrap.appendChild(cd);}
  return wrap;
}

// ══ DETAILS ══
function mkDet(ex,d,c){
  var det=h('div');
  if(ex.date)det.appendChild(h('div',{cls:'det-date'},['📅 '+fmt(ex.date)]));
  if(d!==null&&d>0){
    var tb=h('div',{cls:'tboxes'});

function toast(msg){
  var t=document.createElement('div');
  t.className='toast';t.style.background='rgba(34,197,94,0.95)';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2500);
}

// ══ CLOCK ══
setInterval(function(){
  S.now=new Date();
  var ct=document.getElementById('ck-t');var cd=document.getElementById('ck-d');
  if(ct)ct.textContent=S.now.toLocaleTimeString();
  if(cd)cd.textContent=S.now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
},1000);

document.addEventListener('click',function(){});

// ══ FIREBASE ══
fbGet('exams',function(v){S.exams=v||[];render();});
fbGet('themeDark',function(v){S.themeDark=v||{};if(S.dark)S.draftTheme=null;render();});
fbGet('themeLight',function(v){S.themeLight=v||{};if(!S.dark)S.draftTheme=null;render();});
fbGet('media',function(v){S.media=v;S.draftMedia=v;render();});
fbGet('quote',function(v){S.quote=v||'';S.draftQuote=v||'';render();});
fbGet('viewNames',function(v){S.viewNames=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},v);S.draftViews=null;render();});
fbGet('cardStyle',function(v){S.cardStyle=Object.assign({nameFont:"'Bebas Neue',sans-serif",numFont:"'Bebas Neue',sans-serif",nameSize:18,numSize:52,subjSize:10,dateSize:10,radius:20,padding:20},v);S.draftCard=null;render();});
fbGet('appStyle',function(v){S.appStyle=Object.assign({titleFont:"'Bebas Neue',sans-serif",titleSize:60,bodyFont:"'Inter',sans-serif"},v);S.draftApp=null;render();});

// ══ START ══
render();
</script>
