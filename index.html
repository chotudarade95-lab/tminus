<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>T-MINUS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e2e8f0;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
}
.title{
  font-family:'Orbitron',sans-serif;
  font-size:42px;
  letter-spacing:4px;
  background:linear-gradient(90deg,#6366f1,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.name{
  font-size:20px;
  font-weight:600;
}

.days{
  font-size:48px;
  font-weight:bold;
  margin-top:10px;
  color:#22c55e;
}

.progress{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#6366f1);
  width:60%;
}

/* BUTTON */
.btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">T-MINUS PRO</div>
</div>

<div class="container">

  <div class="card">
    <div class="name">MPSC Exam</div>
    <div class="days">15</div>
    <div class="progress">
      <div class="fill"></div>
    </div>
  </div>

  <div class="card">
    <div class="name">UPSC Prelims</div>
    <div class="days">42</div>
    <div class="progress">
      <div class="fill" style="width:30%"></div>
    </div>
  </div>

  <button class="btn">+ Add Exam</button>

</div>

</body>
</html>
