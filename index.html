*{box-sizing:border-box;margin:0;padding:0;}

body.light{

/* ── Layout ── */
#app{display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px;max-width:680px;margin:0 auto;}

/* ── Header ── */

/* ── Theme menu ── */

.exam-circles{width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:20px;}

.circ-name{font-family:var(--ff-head);font-size:12px;letter-spacing:1px;text-align:center;margin-top:8px;line-height:1.3;color:var(--fg);max-width:130px;}

.circ-det{width:100%;padding:10px 0 2px;}

.empty{width:100%;text-align:center;padding:48px 20px;border:2px dashed var(--card-border);border-radius:20px;color:var(--fg3);margin-bottom:20px;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-txt{font-size:11px;letter-spacing:2px;}

.footer{text-align:center;cursor:default;user-select:none;margin-top:8px;}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function days(d){ if(!d)return null; var e=new Date(d);e.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return Math.ceil((e-t)/86400000); }
function fmtDate(d){ if(!d)return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
function urgColor(d){ if(d===null)return '#6366f1'; if(d<0)return '#6b7280'; if(d<=3)return '#ef4444'; if(d<=7)return '#f59e0b'; if(d<=30)return '#f97316'; return '#22c55e'; }
function pct(d){ return d!==null&&d>=0?Math.max(0,Math.min(100,100-d/3.65)):100; }

// ══════════════════════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════════════════════
function h(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs) for(var k in attrs){
    if(k==='style'&&typeof attrs[k]==='object') Object.assign(e.style,attrs[k]);
    else if(k==='cls') e.className=attrs[k];
    else if(k==='html') e.innerHTML=attrs[k];
    else if(k[0]==='o'&&k[1]==='n') e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e[k]=attrs[k];
  }
  if(kids) [].concat(kids).forEach(function(c){ if(c==null)return; e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c); });
  return e;
}
function svg(tag,attrs){
  var e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  if(attrs) for(var k in attrs) e.setAttribute(k,attrs[k]);
  return e;
}

// RENDER
// ══════════════════════════════════════════════════════
function render(){
  applyCSS();
  var app=document.getElementById('app');
  app.innerHTML='';
  var f=document.createDocumentFragment();
  f.appendChild(buildHeader());
  if(S.media||S.quote) f.appendChild(buildMedia());
  var heroExam=getHero();
  if(heroExam) f.appendChild(buildHero(heroExam));
  f.appendChild(buildControls());
  f.appendChild(buildExams());
  f.appendChild(buildFooter());
  if(S.adminUnlocked){
    f.appendChild(buildAdminBar());
    if(S.adminOpen) f.appendChild(buildAdminPanel());
  }
  if(S.pwOpen) f.appendChild(buildPwModal());
  app.appendChild(f);
}

function applyCSS(){
  document.body.className=S.dark?'':'light';
  var r=document.documentElement.style;
  var th=S.theme||{};
  if(th.bgColor) document.body.style.background=th.bgColor; else document.body.style.background='';
  if(th.fontColor){ r.setProperty('--fg',th.fontColor); r.setProperty('--fg2',th.fontColor+'99'); r.setProperty('--fg3',th.fontColor+'44'); }
  else{ r.removeProperty('--fg'); r.removeProperty('--fg2'); r.removeProperty('--fg3'); }
  if(th.fontFamily) r.setProperty('--ff-body',th.fontFamily); else r.removeProperty('--ff-body');
  // Custom style overrides
  var st=S.style||{};
  if(st.title){
    if(st.title.size) r.setProperty('--fs-title',st.title.size+'px'); else r.removeProperty('--fs-title');
    if(st.title.font) r.setProperty('--ff-head',st.title.font); else r.removeProperty('--ff-head');
  }
  if(st.card){
    if(st.card.size) r.setProperty('--fs-card',st.card.size+'px'); else r.removeProperty('--fs-card');
    if(st.card.radius) r.setProperty('--card-radius',st.card.radius+'px'); else r.removeProperty('--card-radius');
  }
}

// ── Header ──────────────────────────────────────────

  var wrap=h('div',{cls:'header'});
  wrap.appendChild(h('div',{cls:'clock',id:'clk'},[S.now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' · '+S.now.toLocaleTimeString()]));
  var trow=h('div',{cls:'title-row'});
  trow.appendChild(h('h1',{cls:'app-title'},['T-MINUS']));
  var mwrap=h('div',{style:{position:'relative'}});
  mwrap.appendChild(h('button',{cls:'menu-btn',onClick:function(e){e.stopPropagation();S.showMenu=!S.showMenu;render();}},['⋮']));
  if(S.showMenu){
    var md=h('div',{cls:'theme-menu',onClick:function(e){e.stopPropagation();}});
    md.appendChild(h('div',{style:{fontSize:'8px',color:'#ffffff40',letterSpacing:'2px',padding:'4px 10px 8px',borderBottom:'1px solid #ffffff0a',marginBottom:'4px'}},['🎨 THEME']));
    [{icon:'🌙',label:'DARK',sub:'Black · easy on eyes',dark:true},{icon:'☀️',label:'LIGHT',sub:'White · bright & clean',dark:false}].forEach(function(t){
      var active=S.dark===t.dark;
      var btn=h('button',{cls:'theme-opt',onClick:function(){S.dark=t.dark;localStorage.setItem('tdark',t.dark?'1':'0');S.showMenu=false;render();}});
      btn.appendChild(h('div',{cls:'theme-swatch',style:{background:t.dark?'linear-gradient(135deg,#0f0f1a,#1a1a2e)':'linear-gradient(135deg,#f0f4ff,#e0e7ff)',border:'2px solid '+(active?'#6366f1':'transparent')}},[t.icon]));
      var tl=h('div',{cls:'theme-label'});
      tl.appendChild(h('b',{},[t.label]));
      tl.appendChild(h('span',{},[t.sub]));
      btn.appendChild(tl);

// ── Media/Quote ──────────────────────────────────────
function buildMedia(){
  if(S.media){
    var w=h('div',{cls:'media-wrap'});
    w.appendChild(S.media.type==='video'?h('video',{src:S.media.url,autoplay:true,loop:true,muted:true}):h('img',{src:S.media.url}));

// ── Hero ──────────────────────────────────────────────
function getHero(){
  var sorted=sortedExams();
  return sorted.find(function(e){if(e.hidden)return false;var d=days(e.date);return d!==null&&d>=0;});
}
function buildHero(ex){
  var d=days(ex.date); var c=urgColor(d);
  var wrap=h('div',{cls:'hero',style:{background:'linear-gradient(135deg,'+ex.color+'20,'+ex.color+'08)',border:'1px solid '+ex.color+'30'}});
  var info=h('div',{cls:'hero-info'});
  info.appendChild(h('div',{cls:'hero-tag'},['⚡ NEXT EXAM']));
  info.appendChild(h('div',{cls:'hero-name'},[ex.name]));
  if(ex.date) info.appendChild(h('div',{cls:'hero-date'},[fmtDate(ex.date)]));
  wrap.appendChild(info);
  var right=h('div');
  right.appendChild(h('div',{cls:'hero-num',style:{color:c,filter:'drop-shadow(0 0 12px '+c+'88)'}},[d===0?'NOW':d===null?'—':String(d)]));
  right.appendChild(h('div',{cls:'hero-lbl'},['T-MINUS']));
  wrap.appendChild(right);
  return wrap;
}

  var sw=h('div',{cls:'search-wrap'});

  var vn=S.viewNames; var vbar=h('div',{cls:'view-bar'});
  [['grid','⊞',vn.same?(vn.sameName||'GRID'):(vn.grid||'GRID')],
   ['list','☰',vn.same?(vn.sameName||'LIST'):(vn.list||'LIST')],
   ['circle','◎',vn.same?(vn.sameName||'CIRCLE'):(vn.circle||'CIRCLE')]].forEach(function(v){
    var btn=h('button',{cls:'view-btn'+(S.view===v[0]?' on':''),onClick:function(){S.view=v[0];localStorage.setItem('tv',v[0]);S.expanded=null;renderExams();}});
    btn.appendChild(h('span',{cls:'view-icon'},[v[1]]));

// ── Exams ─────────────────────────────────────────────
function sortedExams(){
  return S.exams.slice().sort(function(a,b){
    if(a.pinned&&!b.pinned)return -1; if(!a.pinned&&b.pinned)return 1;
    if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1;
    return new Date(a.date)-new Date(b.date);
  });
}
function filteredExams(){
  return sortedExams().filter(function(e){
    if(e.hidden&&!S.showHidden)return false;
    if(!S.search.trim())return true;
    var q=S.search.toLowerCase();
    return e.name.toLowerCase().includes(q)||(e.subject||'').toLowerCase().includes(q);
  });
}
function buildExams(){
  var wrap=h('div',{id:'exams-wrap'});
  if(!S.exams.length){
    wrap.appendChild(h('div',{cls:'empty'},[h('div',{cls:'empty-icon'},['📅']),h('div',{cls:'empty-txt'},['NO EXAMS ADDED YET'])]));
    return wrap;
  }
  renderExamsInto(wrap);
  return wrap;
}
function renderExams(){
  var w=document.getElementById('exams-wrap');
  if(w){ w.innerHTML=''; renderExamsInto(w); }
}
function renderExamsInto(wrap){
  var list=filteredExams();
  if(S.view==='list'){
    var ul=h('div',{cls:'exam-list'});
    list.forEach(function(e){ ul.appendChild(buildListItem(e)); });
    wrap.appendChild(ul);
  } else if(S.view==='circle'){
    var cg=h('div',{cls:'exam-circles'});
    list.forEach(function(e){ cg.appendChild(buildCircleItem(e)); });
    wrap.appendChild(cg);
  } else {
    var g=h('div',{cls:'exam-grid'});
    list.forEach(function(e){ g.appendChild(buildCard(e)); });
    wrap.appendChild(g);
  }
  // Hidden toggle
  var hidCount=S.exams.filter(function(e){return e.hidden;}).length;
  if(hidCount>0){
    wrap.appendChild(h('div',{style:{textAlign:'center',marginBottom:'12px'}},
      [h('button',{cls:'btn-o',style:{fontSize:'9px',letterSpacing:'1px'},onClick:function(){S.showHidden=!S.showHidden;renderExams();}},
        [S.showHidden?'👁 HIDE HIDDEN':'👁 SHOW '+hidCount+' HIDDEN'])]));
  }
}

// ── Grid card ────────────────────────────────────────
function buildCard(ex){
  var d=days(ex.date); var c=urgColor(d); var p=pct(d);
  var isExp=S.expanded===ex.id;
  var card=h('div',{cls:'exam-card'+(isExp?' exp':'')+(ex.pinned?' pin':''),style:{'--c':ex.color,opacity:ex.hidden?'0.5':'1'}});
  card.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  // Top
  var top=h('div',{cls:'card-top'});
  top.appendChild(h('div',{cls:'card-glow',style:{background:'linear-gradient(135deg,'+ex.color+'30,'+ex.color+'10)'}}));
  top.appendChild(h('div',{cls:'card-dot',style:{background:ex.color,boxShadow:'0 0 10px '+ex.color}}));
  var left=h('div',{cls:'card-left'});
  if(ex.subject) left.appendChild(h('div',{cls:'card-subj'},[(ex.pinned?'📌 ':'')+ex.subject]));
  else if(ex.pinned) left.appendChild(h('div',{cls:'card-subj'},['📌 PINNED']));
  left.appendChild(h('div',{cls:'card-name'},[ex.name||'Unnamed']));
  top.appendChild(left);
  var right=h('div',{cls:'card-right'});
  right.appendChild(h('div',{cls:'card-days',style:{color:c,filter:'drop-shadow(0 0 8px '+c+'88)'}},[d===null?'—':d<0?'✓':d===0?'NOW':String(d)]));
  right.appendChild(h('div',{cls:'card-dlbl'},[d===null?'NO DATE':d<0?'PASSED':d===0?'TODAY':'T-MINUS']));
  top.appendChild(right);
  card.appendChild(top);
  // Progress
  var pb=h('div',{cls:'card-prog'});
  var pt=h('div',{cls:'prog-track'}); pt.appendChild(h('div',{cls:'prog-fill',style:{width:p+'%',background:c}})); pb.appendChild(pt);
  pb.appendChild(h('div',{cls:'card-arr'},[isExp?'▲':'▼']));
  card.appendChild(pb);
  // Details
  if(isExp) card.appendChild(buildDetails(ex,d,c,'card-det'));
  return card;
}

// ── List item ────────────────────────────────────────
function buildListItem(ex){
  var d=days(ex.date); var c=urgColor(d); var p=pct(d);
  var isExp=S.expanded===ex.id;
  var wrap=h('div');
  var item=h('div',{cls:'list-item'+(isExp?' exp':''),style:{'--c':ex.color,opacity:ex.hidden?'0.5':'1'}});
  item.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  var circ=h('div',{cls:'list-circ',style:{borderColor:c,background:c+'18','--c':ex.color}});
  circ.appendChild(h('div',{cls:'lc-num',style:{color:c}},[d===null?'—':d<0?'✓':d===0?'!':String(d)]));
  circ.appendChild(h('div',{cls:'lc-lbl'},[d===null?'N/A':d<0?'DONE':d===0?'TODAY':'DAYS']));
  item.appendChild(circ);
  var info=h('div',{cls:'list-info'});
  if(ex.pinned||ex.subject) info.appendChild(h('div',{cls:'li-sub'},[(ex.pinned?'📌 ':'')+( ex.subject||'')]));
  info.appendChild(h('div',{cls:'li-name'},[ex.name||'Unnamed']));
  if(ex.date) info.appendChild(h('div',{cls:'li-date'},[fmtDate(ex.date)]));
  var lp=h('div',{cls:'li-prog'}); lp.appendChild(h('div',{cls:'li-pfill',style:{width:p+'%',background:c}})); info.appendChild(lp);
  item.appendChild(info);
  item.appendChild(h('div',{cls:'list-arr'},[isExp?'▲':'▼']));
  wrap.appendChild(item);
  if(isExp){
    var det=h('div',{cls:'list-det',style:{'--c':ex.color}});
    det.appendChild(buildDetails(ex,d,c,''));
    wrap.appendChild(det);
  }
  return wrap;
}

// ── Circle item ──────────────────────────────────────
function buildCircleItem(ex){
  var d=days(ex.date); var c=urgColor(d); var p=pct(d);
  var isExp=S.expanded===ex.id;
  var wrap=h('div',{cls:'circ-wrap'+(isExp?' exp':''),style:{'--c':ex.color,opacity:ex.hidden?'0.5':'1'}});
  wrap.addEventListener('click',function(){S.expanded=isExp?null:ex.id;renderExams();});
  // SVG ring
  var r=47; var circ2=2*Math.PI*r; var offset=circ2-(p/100)*circ2;
  var ring=h('div',{cls:'circ-ring'});
  var s=svg('svg',{width:'110',height:'110',style:'position:absolute;top:0;left:0;transform:rotate(-90deg)'});
  var tr=svg('circle',{cx:'55',cy:'55',r:String(r),fill:'none',stroke:c+'22','stroke-width':'7'});
  var fl=svg('circle',{cx:'55',cy:'55',r:String(r),fill:'none',stroke:c,'stroke-width':'7','stroke-linecap':'round','stroke-dasharray':String(circ2),'stroke-dashoffset':String(offset)});
  s.appendChild(tr); s.appendChild(fl); ring.appendChild(s);
  var mid=h('div',{cls:'circ-mid'});
  mid.appendChild(h('div',{cls:'circ-num',style:{color:c,filter:'drop-shadow(0 0 8px '+c+'88)'}},[d===null?'—':d<0?'✓':d===0?'NOW':String(d)]));
  mid.appendChild(h('div',{cls:'circ-lbl'},[d===null?'N/A':d<0?'PASSED':d===0?'TODAY':'T-MINUS']));
  ring.appendChild(mid);
  wrap.appendChild(ring);
  wrap.appendChild(h('div',{cls:'circ-name'},[ex.name||'Unnamed']));
  if(ex.subject) wrap.appendChild(h('div',{cls:'circ-sub'},[ex.subject]));
  if(isExp){ var cd=h('div',{cls:'circ-det'}); cd.appendChild(buildDetails(ex,d,c,'')); wrap.appendChild(cd); }
  return wrap;
}

// ── Shared details panel ─────────────────────────────
function buildDetails(ex,d,c,cls){
  var det=h('div',{cls:cls});
  if(ex.date) det.appendChild(h('div',{cls:'det-date'},['📅 '+fmtDate(ex.date)]));
  if(d!==null&&d>0){
    var tr=h('div',{cls:'time-row'});
    [[Math.floor(d/7),'WEEKS'],[d%7,'DAYS'],[23-new Date().getHours(),'HOURS']].forEach(function(p){
      var b=h('div',{cls:'time-box'});
      b.appendChild(h('div',{cls:'time-val',style:{color:c}},[String(p[0])]));
      b.appendChild(h('div',{cls:'time-lbl'},[p[1]]));
      tr.appendChild(b);
    });
    det.appendChild(tr);
  }
  if(d===0) det.appendChild(h('div',{cls:'det-msg',style:{color:'#f59e0b'}},['🔥 EXAM IS TODAY — GOOD LUCK!']));
  if(d!==null&&d<0) det.appendChild(h('div',{cls:'det-msg',style:{color:'var(--fg3)'}},['✓ This exam has passed.']));
  // Options
  var opts=h('div',{cls:'det-opts'});
  opts.appendChild(h('button',{cls:'opt-btn',onClick:function(e){e.stopPropagation();
    S.exams=S.exams.map(function(x){return x.id===ex.id?Object.assign({},x,{pinned:!x.pinned}):x;});
    fbSet('exams',S.exams);S.expanded=null;renderExams();
  }},[ex.pinned?'📌 UNPIN':'📌 PIN']));
  opts.appendChild(h('button',{cls:'opt-btn',onClick:function(e){e.stopPropagation();
    S.exams=S.exams.map(function(x){return x.id===ex.id?Object.assign({},x,{hidden:!x.hidden}):x;});
    fbSet('exams',S.exams);S.expanded=null;renderExams();
  }},[ex.hidden?'👁 SHOW':'👁 HIDE']));
  det.appendChild(opts);
  return det;
}

// ── Password modal ───────────────────────────────────
function buildPwModal(){
  var bg=h('div',{cls:'modal-bg',onClick:function(){S.pwOpen=false;render();}});
  var m=h('div',{cls:'modal',onClick:function(e){e.stopPropagation();}});
  m.appendChild(h('div',{cls:'modal-title'},['🔐 ADMIN']));
  m.appendChild(h('div',{cls:'modal-sub'},['Enter admin password']));
  var inp=h('input',{type:'password',cls:'inp',value:S.pwVal,
    style:{textAlign:'center',letterSpacing:'4px',border:'1px solid '+(S.pwErr?'#ef4444':'var(--input-border)')},

  setTimeout(function(){if(inp)inp.focus();},80);
  m.appendChild(inp);
  if(S.pwErr) m.appendChild(h('div',{style:{color:'#ef4444',textAlign:'center',fontSize:'10px',marginTop:'6px'}},['❌ Wrong password']));
  var br=h('div',{cls:'btn-row',style:{marginTop:'14px'}});
  br.appendChild(h('button',{cls:'btn-g',style:{flex:'1',marginTop:'0'},onClick:doPw},['UNLOCK']));
  br.appendChild(h('button',{cls:'btn-o',onClick:function(){S.pwOpen=false;S.pwVal='';S.pwErr=false;render();}},['CANCEL']));
  m.appendChild(br);
  bg.appendChild(m);
  return bg;
}
function doPw(){ if(S.pwVal===PW){S.adminUnlocked=true;S.adminOpen=true;S.pwOpen=false;S.pwVal='';S.pwErr=false;render();}else{S.pwErr=true;render();} }

// ── Exams tab ─────────────────────────────────────────
function buildExamsTab(){
  var f=document.createDocumentFragment();
  var hdr=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}});
  hdr.appendChild(h('div',{style:{fontSize:'10px',color:'var(--fg2)'}},[ S.exams.length+' EXAMS']));
  hdr.appendChild(h('button',{cls:'btn-o',onClick:function(){
    S.editId='new';S.draft={id:uid(),name:'',date:'',imageUrl:'',color:COLORS[S.exams.length%COLORS.length],subject:'',pinned:false,hidden:false};render();
  }},['+ ADD EXAM']));
  f.appendChild(hdr);
  if(S.editId==='new') f.appendChild(buildExamEditor(S.draft,true));
  S.exams.forEach(function(ex){
    if(S.editId===ex.id){ f.appendChild(buildExamEditor(S.draft,false)); return; }
    var row=h('div',{cls:'exam-row'});
    row.appendChild(h('div',{cls:'er-dot',style:{background:urgColor(days(ex.date))}}));
    var info=h('div',{cls:'er-info'});
    info.appendChild(h('div',{cls:'er-name'},[(ex.pinned?'📌 ':''),(ex.hidden?'🙈 ':'')+ex.name]));
    info.appendChild(h('div',{cls:'er-sub'},[(ex.subject?ex.subject+' · ':'')+fmtDate(ex.date)]));
    row.appendChild(info);
    row.appendChild(h('button',{cls:'er-edit',onClick:function(){S.editId=ex.id;S.draft=Object.assign({},ex);render();}},['EDIT']));
    f.appendChild(row);
  });
  return f;
}
function buildExamEditor(draft,isNew){
  var box=h('div',{cls:'editor-box'});
  box.appendChild(h('div',{cls:'editor-title'},[isNew?'➕ NEW EXAM':'✏️ EDIT EXAM']));
  function lbl(t){ return h('span',{cls:'lbl'},[t]); }
  function inp2(val,key,ph){ return h('input',{cls:'inp',type:'text',value:val,placeholder:ph,onInput:function(e){draft[key]=e.target.value;}}); }
  box.appendChild(lbl('EXAM NAME *')); box.appendChild(inp2(draft.name,'name','e.g. Final Math Exam'));
  box.appendChild(lbl('SUBJECT')); box.appendChild(inp2(draft.subject,'subject','e.g. Mathematics'));
  box.appendChild(lbl('DATE *'));
  box.appendChild(h('input',{cls:'inp',type:'date',value:draft.date,onChange:function(e){draft.date=e.target.value;}}));
  box.appendChild(lbl('IMAGE URL'));
  box.appendChild(inp2(draft.imageUrl,'imageUrl','Paste image URL...'));
  box.appendChild(lbl('COLOR'));
  var cr=h('div',{cls:'color-row'});
  cr.appendChild(h('input',{type:'color',value:draft.color,style:{width:'36px',height:'36px',border:'1px solid var(--input-border)',borderRadius:'8px',background:'none',cursor:'pointer'},onInput:function(e){draft.color=e.target.value;}}));
  COLORS.forEach(function(c){ cr.appendChild(h('div',{cls:'cdot'+(draft.color===c?' sel':''),style:{background:c},onClick:function(){draft.color=c;var ci=cr.querySelector('input[type=color]');if(ci)ci.value=c;}})); });
  box.appendChild(cr);
  var br=h('div',{cls:'btn-row'});
  br.appendChild(h('button',{cls:'btn-g',style:{flex:'1',marginTop:'0'},onClick:function(){
    if(!draft.name||!draft.date){alert('Please fill exam name and date!');return;}
    if(isNew) S.exams.push(draft); else S.exams=S.exams.map(function(x){return x.id===draft.id?draft:x;});
    fbSet('exams',S.exams);showToast('✅ SAVED!');S.editId=null;render();
  }},[isNew?'ADD EXAM':'SAVE']));
  if(!isNew) br.appendChild(h('button',{cls:'btn-r',onClick:function(){
    if(confirm('Delete this exam?')){S.exams=S.exams.filter(function(x){return x.id!==draft.id;});fbSet('exams',S.exams);showToast('🗑️ DELETED');S.editId=null;render();}
  }},['DEL']));
  br.appendChild(h('button',{cls:'btn-o',onClick:function(){S.editId=null;render();}},['CANCEL']));
  box.appendChild(br);
  return box;
}

// ── Theme tab ────────────────────────────────────────
function buildThemeTab(){
  if(!S.draftTheme) S.draftTheme=Object.assign({bgColor:'#0a0a0f',fontColor:'#ffffff',fontFamily:"'Space Mono',monospace"},S.theme);
  var dt=S.draftTheme;
  var f=document.createDocumentFragment();
  f.appendChild(h('span',{cls:'lbl'},['FONT FAMILY']));
  var fw=h('div',{cls:'font-wrap',style:{marginBottom:'8px'}});
  FONTS.forEach(function(fn){
    fw.appendChild(h('button',{cls:'fbtn'+(dt.fontFamily===fn.v?' sel':''),style:{fontFamily:fn.v},onClick:function(){dt.fontFamily=fn.v;render();}},[ fn.l]));
  });
  f.appendChild(fw);
  [{lbl:'BACKGROUND COLOR',key:'bgColor',presets:BGPRESETS},{lbl:'TEXT COLOR',key:'fontColor',presets:FGPRESETS}].forEach(function(cfg){
    f.appendChild(h('span',{cls:'lbl'},[cfg.lbl]));
    var row=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});
    row.appendChild(h('input',{type:'color',value:dt[cfg.key],style:{width:'40px',height:'40px',border:'1px solid var(--input-border)',borderRadius:'8px',background:'none',cursor:'pointer'},onInput:function(e){dt[cfg.key]=e.target.value;render();}}));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--fg2)'}},[dt[cfg.key].toUpperCase()]));
    f.appendChild(row);
    var pr=h('div',{cls:'preset-row'});
    cfg.presets.forEach(function(c){ pr.appendChild(h('div',{cls:'pcol'+(dt[cfg.key]===c?' sel':''),style:{background:c},onClick:function(){dt[cfg.key]=c;render();}})); });
    f.appendChild(pr);
  });
  // Preview
  f.appendChild(h('span',{cls:'lbl'},['PREVIEW']));
  var prev=h('div',{style:{background:dt.bgColor,border:'1px solid var(--input-border)',borderRadius:'12px',padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}});
  prev.appendChild(h('div',{style:{fontFamily:dt.fontFamily,fontSize:'20px',color:dt.fontColor}},['T-MINUS']));
  prev.appendChild(h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'36px',color:dt.fontColor}},['42']));
  f.appendChild(prev);
  f.appendChild(h('button',{cls:'btn-g',onClick:function(){
    S.theme=Object.assign({},dt);fbSet('theme',S.theme);showToast('✅ THEME SAVED FOR ALL STUDENTS!');render();
  }},['APPLY TO ALL STUDENTS']));
  return f;
}

// ── Style tab ────────────────────────────────────────
function buildStyleTab(){
  if(!S.draftStyle) S.draftStyle=JSON.parse(JSON.stringify(S.style||{title:{},card:{},hero:{},body:{}}));
  var ds=S.draftStyle;
  var f=document.createDocumentFragment();
  f.appendChild(h('div',{style:{fontSize:'10px',color:'var(--fg2)',marginBottom:'16px',lineHeight:'1.6'}},['Customize sizes, fonts and colors for each section of the app.']));

  // Title section
  var s1=h('div',{cls:'section-editor'});
  s1.appendChild(h('div',{cls:'sec-title'},['📌 TITLE (T-MINUS)']));
  s1.appendChild(h('span',{cls:'lbl'},['FONT SIZE']));
  if(!ds.title) ds.title={};
  s1.appendChild(sliderRow('Title size',ds.title.size||60,30,120,function(v){ds.title.size=v;applyStylePreview(ds);}));
  s1.appendChild(h('span',{cls:'lbl'},['FONT']));
  var fw1=h('div',{cls:'font-wrap'});
  FONTS.forEach(function(fn){
    fw1.appendChild(h('button',{cls:'fbtn'+((ds.title.font||fn.v)===fn.v?' sel':''),style:{fontFamily:fn.v},onClick:function(){ds.title.font=fn.v;render();}},[ fn.l]));
  });
  s1.appendChild(fw1);
  f.appendChild(s1);

  // Card section
  var s2=h('div',{cls:'section-editor'});
  s2.appendChild(h('div',{cls:'sec-title'},['🃏 EXAM CARDS']));
  if(!ds.card) ds.card={};
  s2.appendChild(h('span',{cls:'lbl'},['NAME FONT SIZE']));
  s2.appendChild(sliderRow('Card text',ds.card.size||18,10,32,function(v){ds.card.size=v;applyStylePreview(ds);}));
  s2.appendChild(h('span',{cls:'lbl'},['CORNER RADIUS']));
  s2.appendChild(sliderRow('Roundness',ds.card.radius||18,0,32,function(v){ds.card.radius=v;applyStylePreview(ds);}));
  f.appendChild(s2);

  f.appendChild(h('button',{cls:'btn-g',onClick:function(){
    S.style=JSON.parse(JSON.stringify(ds));fbSet('style',S.style);applyCSS();showToast('✅ STYLE SAVED!');render();
  }},['SAVE STYLE FOR ALL STUDENTS']));
  return f;
}
function sliderRow(lbl2,val,min2,max2,onch){
  var row=h('div',{cls:'slider-row'});
  var valEl=h('div',{cls:'slider-val'},[String(Math.round(val))]);
  row.appendChild(h('span',{cls:'slider-lbl'},[lbl2]));
  var sl=h('input',{type:'range',cls:'slider',min:String(min2),max:String(max2),value:String(val),onInput:function(e){valEl.textContent=Math.round(e.target.value);onch(Number(e.target.value));}});
  row.appendChild(sl);
  row.appendChild(valEl);
  return row;
}
function applyStylePreview(ds){
  var r=document.documentElement.style;
  if(ds.title&&ds.title.size) r.setProperty('--fs-title',ds.title.size+'px');
  if(ds.title&&ds.title.font) r.setProperty('--ff-head',ds.title.font);
  if(ds.card&&ds.card.size) r.setProperty('--fs-card',ds.card.size+'px');
  if(ds.card&&ds.card.radius) r.setProperty('--card-radius',ds.card.radius+'px');
}

// ── Media tab ────────────────────────────────────────
function buildMediaTab(){
  var f=document.createDocumentFragment();
  f.appendChild(h('span',{cls:'lbl'},['MOTIVATIONAL IMAGE / VIDEO']));
  var ul=h('label',{cls:'upload-zone'});
  ul.appendChild(h('div',{cls:'upload-icon'},['📁']));
  ul.appendChild(h('div',{cls:'upload-txt'},[S.draftMedia?'✅ '+S.draftMedia.name:'TAP TO UPLOAD IMAGE / GIF / VIDEO']));
  var fi=h('input',{type:'file',accept:'image/*,video/*,.gif',style:{display:'none'},onChange:function(e){
    var file=e.target.files[0];if(!file)return;
    var r2=new FileReader();r2.onload=function(ev){S.draftMedia={url:ev.target.result,type:file.type.startsWith('video/')?'video':'image',name:file.name};render();};r2.readAsDataURL(file);
  }});
  ul.appendChild(fi);
  f.appendChild(ul);
  if(S.draftMedia&&S.media) f.appendChild(h('button',{cls:'btn-r',style:{marginTop:'8px',width:'100%'},onClick:function(){S.draftMedia=null;S.media=null;fbSet('media',null);showToast('🗑️ MEDIA REMOVED');render();}},['REMOVE CURRENT MEDIA']));
  f.appendChild(h('span',{cls:'lbl'},['MOTIVATIONAL QUOTE']));
  f.appendChild(h('textarea',{cls:'inp',rows:3,placeholder:'Type a quote...',style:{resize:'vertical',marginBottom:'8px'},onInput:function(e){S.draftQuote=e.target.value;}},[ S.draftQuote||'']));
  f.appendChild(h('span',{cls:'lbl'},['PRESET QUOTES']));
  var ql=h('div',{style:{maxHeight:'140px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px'}});
  QUOTES.forEach(function(q){
    ql.appendChild(h('button',{cls:'quote-preset'+(S.draftQuote===q?' sel':''),onClick:function(){S.draftQuote=q;render();}},[ q]));
  });
  f.appendChild(ql);
  f.appendChild(h('button',{cls:'btn-g',onClick:function(){
    S.media=S.draftMedia;S.quote=S.draftQuote;
    if(S.draftMedia) fbSet('media',S.draftMedia);
    fbSet('quote',S.draftQuote);
    showToast('✅ MEDIA SAVED!');render();
  }},['SAVE FOR ALL STUDENTS']));
  return f;
}

// ── Views tab ────────────────────────────────────────
function buildViewsTab(){
  if(!S.draftViews) S.draftViews=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},S.viewNames);
  var dv=S.draftViews;
  var f=document.createDocumentFragment();
  // Same toggle
  var tr=h('div',{cls:'toggle-row',onClick:function(){dv.same=!dv.same;render();}});
  var ti=h('div',{cls:'tog-info'});
  ti.appendChild(h('b',{},['🔁 SAME NAME FOR ALL VIEWS']));
  ti.appendChild(h('span',{},['All 3 buttons show same label']));
  tr.appendChild(ti);
  var tog=h('div',{cls:'tog',style:{background:dv.same?'#6366f1':'var(--prog-track)'}});
  tog.appendChild(h('div',{cls:'tog-k',style:{left:dv.same?'23px':'3px'}}));
  tr.appendChild(tog);
  f.appendChild(tr);
  if(dv.same){
    f.appendChild(h('span',{cls:'lbl'},['NAME FOR ALL 3 VIEWS']));
    f.appendChild(h('input',{cls:'inp',type:'text',value:dv.sameName,placeholder:'e.g. EXAMS...',onInput:function(e){dv.sameName=e.target.value;}}));
  } else {
    [['grid','⊞','GRID VIEW NAME'],['list','☰','LIST VIEW NAME'],['circle','◎','CIRCLE VIEW NAME']].forEach(function(cfg){
      f.appendChild(h('span',{cls:'lbl'},[cfg[1]+' '+cfg[2]]));
      f.appendChild(h('input',{cls:'inp',type:'text',value:dv[cfg[0]],placeholder:cfg[0].toUpperCase()+'...',onInput:function(e){dv[cfg[0]]=e.target.value;}}));
    });
  }
  // Preview
  f.appendChild(h('span',{cls:'lbl'},['PREVIEW']));
  var pb=h('div',{cls:'preview-bar'});
  [['⊞',dv.same?(dv.sameName||'GRID'):(dv.grid||'GRID')],['☰',dv.same?(dv.sameName||'LIST'):(dv.list||'LIST')],['◎',dv.same?(dv.sameName||'CIRCLE'):(dv.circle||'CIRCLE')]].forEach(function(p,i){
    var btn=h('div',{cls:'pvbtn'+(i===0?' first':'')});
    btn.appendChild(h('div',{style:{fontSize:'16px'}},[p[0]]));
    btn.appendChild(h('div',{style:{fontSize:'9px',color:i===0?'var(--tab-active)':'var(--fg3)',marginTop:'3px',letterSpacing:'1px'}},[p[1]]));
    pb.appendChild(btn);
  });
  f.appendChild(pb);
  f.appendChild(h('button',{cls:'btn-g',style:{marginTop:'14px'},onClick:function(){
    S.viewNames=Object.assign({},dv);fbSet('viewNames',S.viewNames);showToast('✅ VIEW NAMES SAVED!');render();
  }},['SAVE FOR ALL STUDENTS']));
  return f;
}

// ── Ads tab ──────────────────────────────────────────
function buildAdsTab(){
  var f=document.createDocumentFragment();
  f.appendChild(h('div',{style:{fontSize:'10px',color:'var(--fg2)',marginBottom:'16px',lineHeight:'1.8'}},['Coming soon! You will be able to add banner ads, image ads and text ads here to earn money from your app.']));
  f.appendChild(h('div',{style:{textAlign:'center',fontSize:'40px',marginBottom:'12px'}},['📢']));
  f.appendChild(h('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--fg3)',letterSpacing:'2px'}},['ADS PANEL — COMING SOON']));
  return f;
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg){
  var t=document.createElement('div');
  t.className='toast';t.style.background='rgba(34,197,94,0.95)';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}

// ── Clock ─────────────────────────────────────────────
setInterval(function(){
  S.now=new Date();
  var c=document.getElementById('clk');
  if(c) c.textContent=S.now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' · '+S.now.toLocaleTimeString();
},1000);

// ── Close menu on click ───────────────────────────────
document.addEventListener('click',function(){if(S.showMenu){S.showMenu=false;render();}});

// ══════════════════════════════════════════════════════
// FIREBASE LISTENERS
// ══════════════════════════════════════════════════════
fbGet('exams',function(v){S.exams=v||[];render();});
fbGet('theme',function(v){S.theme=v||{};S.draftTheme=null;render();});
fbGet('media',function(v){S.media=v;S.draftMedia=v;render();});
fbGet('quote',function(v){S.quote=v||'';S.draftQuote=v||'';render();});
fbGet('viewNames',function(v){S.viewNames=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',same:false,sameName:''},v);S.draftViews=null;render();});
fbGet('style',function(v){S.style=v||{title:{},card:{},hero:{},body:{}};S.draftStyle=null;render();});

// ── Initial render ────────────────────────────────────
render();
</script>
