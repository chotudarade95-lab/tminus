function getDaysLeft(d) {
  if (!d) return null;
  var e = new Date(d); e.setHours(0,0,0,0);

  return Math.max(0, Math.ceil((e - t) / 86400000));
}
function formatDate(d) {
  if (!d) return "";

function urgency(days) {
  if (days === null) return "#6366f1";

  if (days <= 3) return "#ef4444";
  if (days <= 7) return "#f59e0b";
  if (days <= 30) return "#f97316";
  return "#22c55e";
}
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'style' && typeof attrs[k] === 'object') {
      Object.assign(e.style, attrs[k]);
    } else if (k.startsWith('on')) {
      e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    } else if (k === 'className') {
      e.className = attrs[k];
    } else if (k === 'htmlFor') {
      e.htmlFor = attrs[k];
    } else {
      e[k] = attrs[k];
    }
  });
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(function(c) {
      if (c === null || c === undefined) return;
      if (typeof c === 'string' || typeof c === 'number') {
        e.appendChild(document.createTextNode(c));
      } else {
        e.appendChild(c);
      }
    });
  }
  return e;
}
function t(text) { return document.createTextNode(String(text)); }

// ── Firebase sync ─────────────────────────────────────────────
function showSync(status) {
  state.syncStatus = status;

  var toast = el('div', {
    id: 'sync-toast',
    className: 'sync-toast',
    style: {background: status === 'saving' ? 'rgba(99,102,241,0.95)' : 'rgba(34,197,94,0.95)'}
  }, [status === 'saving' ? '⏳ SYNCING...' : '✅ SYNCED TO ALL DEVICES']);
  document.body.appendChild(toast);
  if (status === 'saved') setTimeout(function(){ toast.remove(); }, 2000);
}
function saveData(key, val) {
  showSync('saving');
  return fbSave(key, val).then(function(){ showSync('saved'); });
}

function buildExamCard(exam, idx, total) {
  var days = getDaysLeft(exam.date);
  var color = urgency(days);
  var isExpanded = state.expandedId === exam.id;
  var wrap = el('div', {style:{opacity:exam.hidden?'0.5':'1',transition:'opacity 0.2s'}});
  var card = el('div', {
    className:'exam-card' + (isExpanded?' expanded':'') + (exam.pinned?' pinned':''),
    style:{'--color': exam.color}
  });

function buildExamEditor(draft, isNew) {
  var box = el('div', {style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'16px',padding:'20px',marginBottom:'12px'}});
  box.appendChild(el('div', {style:{fontSize:'11px',color:state.theme.fontColor,letterSpacing:'2px',marginBottom:'16px',fontWeight:'700'}}, [isNew?'➕ NEW EXAM':'✏️ EDIT EXAM']));

  function lbl(text){ return el('span', {className:'label'}, [text]); }
  function inp(val, key, ph){
    return el('input', {className:'input-field',type:'text',value:val,placeholder:ph,
      onInput:function(e){ draft[key]=e.target.value; }});
  }

  box.appendChild(lbl('EXAM NAME *'));
  box.appendChild(inp(draft.name,'name','e.g. Final Mathematics Exam'));
  box.appendChild(lbl('SUBJECT'));
  box.appendChild(inp(draft.subject,'subject','e.g. Mathematics, Science...'));
  box.appendChild(lbl('EXAM DATE *'));
  var dateInp = el('input', {className:'input-field',type:'date',value:draft.date,
    onChange:function(e){ draft.date=e.target.value; }});
  box.appendChild(dateInp);
  box.appendChild(lbl('IMAGE URL'));
  box.appendChild(inp(draft.imageUrl,'imageUrl','Paste image URL here...'));
  box.appendChild(lbl('ACCENT COLOR'));
  var colorRow = el('div', {style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginTop:'6px'}});
  colorRow.appendChild(el('input', {type:'color',value:draft.color,style:{width:'40px',height:'40px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.15)',background:'none',cursor:'pointer',padding:'2px'},
    onInput:function(e){ draft.color=e.target.value; }}));
  EXAM_COLORS.forEach(function(c){
    colorRow.appendChild(el('div', {
      className:'color-dot'+(draft.color===c?' selected':''),
      style:{background:c},
      onClick:function(){ draft.color=c; var ci=box.querySelector('input[type=color]'); if(ci)ci.value=c; }
    }));
  });
  box.appendChild(colorRow);

  var btnRow = el('div', {style:{display:'flex',gap:'8px',marginTop:'18px'}});
  var saveBtn = el('button', {className:'btn-green', onClick:function(){
    if(!draft.name||!draft.date) return alert('Please fill in exam name and date!');
    if(isNew){ state.exams.push(draft); }
    else { state.exams = state.exams.map(function(e){return e.id===draft.id?draft:e;}); }
    saveData('exams', state.exams); state.editingExam=null; render();
  }}, [isNew?'ADD EXAM':'SAVE']);
  btnRow.appendChild(saveBtn);
  if (!isNew) {
    btnRow.appendChild(el('button', {className:'btn-red', onClick:function(){
      if(confirm('Delete this exam?')){ state.exams=state.exams.filter(function(e){return e.id!==draft.id;}); saveData('exams',state.exams); state.editingExam=null; render(); }
    }}, ['DELETE']));
  }
  btnRow.appendChild(el('button', {className:'btn-outline', onClick:function(){ state.editingExam=null; render(); }}, ['CANCEL']));
  box.appendChild(btnRow);
  return box;
}

  var uploadLabel = el('label', {style:{display:'block',border:'2px dashed var(--upload-border)',borderRadius:'14px',padding:'24px',textAlign:'center',cursor:'pointer',marginBottom:'12px',background:'var(--upload-bg)'}});
  uploadLabel.appendChild(el('div', {style:{fontSize:'28px',marginBottom:'8px'}}, ['📁']));
  uploadLabel.appendChild(el('div', {style:{fontSize:'11px',color:'var(--upload-text)'}}, [state.draftMedia?state.draftMedia.name:'TAP TO UPLOAD IMAGE / GIF / VIDEO']));
  var fileInp = el('input', {type:'file',accept:'image/*,video/*,.gif',style:{display:'none'},onChange:function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){ state.draftMedia={url:ev.target.result,type:f.type.startsWith('video/')?'video':'image',name:f.name}; render(); };
    r.readAsDataURL(f);
  }});
  uploadLabel.appendChild(fileInp);
  frag.appendChild(uploadLabel);

  frag.appendChild(el('span', {className:'label'}, ['MOTIVATIONAL QUOTE']));
  frag.appendChild(el('textarea', {
    className:'input-field', rows:3, placeholder:'Enter a motivational quote...',
    style:{marginBottom:'12px',resize:'vertical'},
    onInput:function(e){ state.draftQuote=e.target.value; }
  }, [state.draftQuote]));

  var presetsList = el('div', {style:{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'16px',maxHeight:'140px',overflowY:'auto'}});
  PRESET_QUOTES.forEach(function(q){
    presetsList.appendChild(el('button', {
      style:{background:state.draftQuote===q?'var(--quote-btn-sel-bg)':'var(--quote-btn-bg)',border:'1px solid '+(state.draftQuote===q?'var(--quote-btn-sel-border)':'var(--quote-btn-border)'),borderRadius:'8px',padding:'8px 12px',color:'var(--quote-btn-color)',fontSize:'10px',cursor:'pointer',textAlign:'left',lineHeight:'1.5',fontFamily:"'Space Mono',monospace"},
      onClick:function(){ state.draftQuote=q; render(); }
    }, [q]));
  });
  frag.appendChild(presetsList);

  frag.appendChild(el('button', {
    style:{width:'100%',background:state.savedMedia?'#22c55e':'var(--save-btn-bg)',border:'1px solid var(--save-btn-border)',borderRadius:'12px',padding:'13px',color:state.theme.fontColor,fontSize:'12px',letterSpacing:'2px',cursor:'pointer',transition:'all 0.3s',fontFamily:"'Space Mono',monospace"},
    onClick:function(){
      state.media = state.draftMedia; state.quote = state.draftQuote;
      if(state.draftMedia) saveData('media', state.draftMedia);
      saveData('quote', state.draftQuote);
      state.savedMedia=true; render();
      setTimeout(function(){ state.savedMedia=false; render(); }, 2500);
    }
  }, [state.savedMedia?'✓ SYNCED TO ALL DEVICES':'SAVE MEDIA & QUOTE']));
  return frag;
}

function buildViewNamesTab() {
  var frag = document.createDocumentFragment();
  var dv = state.draftViewNames;

  // Title
  frag.appendChild(el('div', {style:{fontSize:'11px',color:'var(--label-color)',letterSpacing:'2px',marginBottom:'20px',lineHeight:'1.6'}},
    ['Set custom names for the 3 view buttons. Students will see these names when switching views.']));

  // Same for all toggle
  var toggleRow = el('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--exam-row-bg)',border:'1px solid var(--exam-row-border)',borderRadius:'12px',padding:'14px 16px',marginBottom:'20px',cursor:'pointer'}});
  toggleRow.addEventListener('click', function(){ dv.sameForAll=!dv.sameForAll; render(); });
  var toggleLeft = el('div');
  toggleLeft.appendChild(el('div',{style:{fontSize:'12px',color:'var(--input-color)',fontWeight:'700',letterSpacing:'1px'}},['🔁 SAME NAME FOR ALL VIEWS']));
  toggleLeft.appendChild(el('div',{style:{fontSize:'9px',color:'var(--label-color)',marginTop:'3px'}},['All 3 view buttons show the same label']));
  toggleRow.appendChild(toggleLeft);
  var tog = el('div',{style:{width:'44px',height:'24px',borderRadius:'12px',background:dv.sameForAll?'#6366f1':'var(--prog-track)',position:'relative',transition:'background 0.2s',flexShrink:'0'}});
  var knob = el('div',{style:{position:'absolute',top:'3px',left:dv.sameForAll?'22px':'3px',width:'18px',height:'18px',borderRadius:'50%',background:'#fff',transition:'left 0.2s',boxShadow:'0 1px 4px rgba(0,0,0,0.3)'}});
  tog.appendChild(knob);
  toggleRow.appendChild(tog);
  frag.appendChild(toggleRow);

  if (dv.sameForAll) {
    // Single name input
    var box = el('div',{style:{background:'var(--exam-row-bg)',border:'1px solid var(--exam-row-border)',borderRadius:'14px',padding:'16px',marginBottom:'20px'}});
    box.appendChild(el('span',{className:'label'},['NAME FOR ALL VIEWS']));
    box.appendChild(el('div',{style:{fontSize:'9px',color:'var(--label-color)',marginBottom:'8px'}},['This label shows on Grid, List and Circle buttons']));
    var inp = el('input',{className:'input-field',type:'text',value:dv.allName,placeholder:'e.g. EXAMS or VIEW...',
      onInput:function(e){ dv.allName=e.target.value; }});
    box.appendChild(inp);

    // Preview
    var prev = el('div',{style:{marginTop:'16px'}});
    prev.appendChild(el('div',{style:{fontSize:'9px',color:'var(--label-color)',letterSpacing:'2px',marginBottom:'8px'}},['PREVIEW']));
    var previewBar = el('div',{style:{display:'flex',gap:'8px',background:'var(--panel-bg)',border:'1px solid var(--panel-border)',borderRadius:'12px',padding:'6px'}});
    ['⊞','☰','◎'].forEach(function(icon,i){
      var pb=el('div',{style:{flex:'1',padding:'8px 0',borderRadius:'8px',textAlign:'center',background:i===0?'var(--tab-active-bg)':'transparent'}});
      pb.appendChild(el('div',{style:{fontSize:'16px'}},[ icon]));
      pb.appendChild(el('div',{style:{fontSize:'9px',color:i===0?'var(--tab-active-color)':'var(--tab-color)',letterSpacing:'1px',marginTop:'3px'}},[dv.allName||'NAME']));
      previewBar.appendChild(pb);
    });
    prev.appendChild(previewBar);
    box.appendChild(prev);
    frag.appendChild(box);
  } else {
    // Separate names
    var box2 = el('div',{style:{background:'var(--exam-row-bg)',border:'1px solid var(--exam-row-border)',borderRadius:'14px',padding:'16px',marginBottom:'20px'}});
    [['grid','⊞','GRID VIEW NAME'],['list','☰','LIST VIEW NAME'],['circle','◎','CIRCLE VIEW NAME']].forEach(function(cfg, i){
      if (i > 0) box2.appendChild(el('div',{style:{height:'1px',background:'var(--divider)',margin:'16px 0'}}));
      var row = el('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}});
      row.appendChild(el('div',{style:{fontSize:'20px',width:'28px',textAlign:'center'}},[cfg[1]]));
      row.appendChild(el('span',{className:'label',style:{margin:'0'}},[ cfg[2]]));
      box2.appendChild(row);
      var inp2 = el('input',{className:'input-field',type:'text',value:dv[cfg[0]],placeholder:'e.g. '+cfg[0].toUpperCase()+'...',
        onInput:function(e){ dv[cfg[0]]=e.target.value; }});
      box2.appendChild(inp2);
    });

    // Preview
    var prev2 = el('div',{style:{marginTop:'16px'}});
    prev2.appendChild(el('div',{style:{fontSize:'9px',color:'var(--label-color)',letterSpacing:'2px',marginBottom:'8px'}},['PREVIEW']));
    var previewBar2 = el('div',{style:{display:'flex',gap:'8px',background:'var(--panel-bg)',border:'1px solid var(--panel-border)',borderRadius:'12px',padding:'6px'}});
    [['⊞',dv.grid||'GRID'],['☰',dv.list||'LIST'],['◎',dv.circle||'CIRCLE']].forEach(function(p,i){
      var pb=el('div',{style:{flex:'1',padding:'8px 0',borderRadius:'8px',textAlign:'center',background:i===0?'var(--tab-active-bg)':'transparent'}});
      pb.appendChild(el('div',{style:{fontSize:'16px'}},[p[0]]));
      pb.appendChild(el('div',{style:{fontSize:'9px',color:i===0?'var(--tab-active-color)':'var(--tab-color)',letterSpacing:'1px',marginTop:'3px'}},[p[1]]));
      previewBar2.appendChild(pb);
    });
    prev2.appendChild(previewBar2);
    box2.appendChild(prev2);
    frag.appendChild(box2);
  }

  // Save button
  frag.appendChild(el('button',{
    style:{width:'100%',background:state.savedViewNames?'#22c55e':'var(--save-btn-bg)',border:'1px solid var(--save-btn-border)',borderRadius:'12px',padding:'13px',color:state.theme.fontColor,fontSize:'12px',letterSpacing:'2px',cursor:'pointer',transition:'all 0.3s',fontFamily:"'Space Mono',monospace"},
    onClick:function(){
      state.viewNames = Object.assign({},dv);
      saveData('viewNames', state.viewNames);
      state.savedViewNames=true; render();
      setTimeout(function(){ state.savedViewNames=false; render(); },2500);
    }
  },[state.savedViewNames?'✓ SYNCED TO ALL STUDENTS':'SAVE VIEW NAMES FOR ALL STUDENTS']));
  return frag;
}


  if (state.pwInput === ADMIN_PASSWORD) {
    state.adminUnlocked=true; state.adminOpen=true;
    state.showPwPrompt=false; state.pwInput=''; state.pwError=false;
    render();
  } else { state.pwError=true; render(); }
}

// ── Close menu on outside click ───────────────────────────────
document.addEventListener('click', function(){ if(state.showMenu){ state.showMenu=false; render(); } });

// ── Clock — only update the clock element, never re-render ────
setInterval(function(){
  state.now = new Date();
  var el = document.getElementById('clock-display');
  if (el) {
    el.textContent = state.now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}) + ' · ' + state.now.toLocaleTimeString();
  }
}, 1000);

// ── Firebase listeners ────────────────────────────────────────
fbListen('theme', function(v){ state.theme=v; state.draftTheme=v; state.isDark=(v.bgColor!=='#f0f4ff'); render(); });
fbListen('exams', function(v){ state.exams=v||[]; render(); });
fbListen('media', function(v){ state.media=v; state.draftMedia=v; render(); });
fbListen('quote', function(v){ state.quote=v||''; state.draftQuote=v||''; render(); });
fbListen('viewNames', function(v){ state.viewNames=Object.assign({grid:'GRID',list:'LIST',circle:'CIRCLE',sameForAll:false,allName:''},v); state.draftViewNames=Object.assign({},state.viewNames); render(); });

// ── Init: show app immediately, Firebase loads in background ──
document.getElementById('loader').style.display = 'none';
document.getElementById('app').style.display = 'flex';
render();

// Safety fallback re-render after 3s in case Firebase is slow
setTimeout(function(){ render(); }, 3000);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("service-worker.js")
      .then(function () { console.log("Service Worker Registered"); })
      .catch(function (e) { console.log("SW registration failed", e); });
  });
}
</script>
