<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>tminus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
</head>
<body>
<h1>tminus</h1>
<div id="data">Loading data...</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
const firebaseConfig = {
apiKey: "AIzaSyDoIrKyweKfpXbWz_sT63uEXsJqIO1wyzo",
authDomain: "t-minus-810ab.firebaseapp.com",
projectId: "t-minus-810ab"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.collection("appdata").onSnapshot((snapshot)=>{
let html="";
snapshot.forEach((doc)=>{
let d = doc.data();
if(d.value){
try{ html += "<p>"+JSON.stringify(JSON.parse(d.value))+"</p>"; }
catch{ html += "<p>"+d.value+"</p>"; }
}else{
html += "<p>"+JSON.stringify(d)+"</p>";
}
});
document.getElementById("data").innerHTML = html;
});
if ('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
